name: Deploy historico (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'web/historico/**'
      - 'supabase/functions/_shared/historicoWebPage.ts'
      - 'scripts/build-historico-template.mjs'
      - 'scripts/fill-historico-html.mjs'
      - '.github/workflows/deploy-historico-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build template
        run: node scripts/build-historico-template.mjs

      - name: Fill Supabase config
        run: node scripts/fill-historico-html.mjs
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/historico

      - id: deployment
        uses: actions/deploy-pages@v4
