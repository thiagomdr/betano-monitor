name: Deploy Supabase (migration + functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'scripts/apply-migration-remote.mjs'
      - 'scripts/validate-betano-link.mjs'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Supabase token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN ausente no repositório GitHub."
            exit 1
          fi

      - name: Apply migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/apply-migration-remote.mjs

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy betano-coleta --project-ref mddortcbebtkopeanrhu
          npx supabase functions deploy betano-coleta-cron --project-ref mddortcbebtkopeanrhu
          npx supabase functions deploy betano-alertas-avaliar --project-ref mddortcbebtkopeanrhu
          npx supabase functions deploy betano-probe --project-ref mddortcbebtkopeanrhu

      - name: Validate betanoUrl
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/validate-betano-link.mjs
