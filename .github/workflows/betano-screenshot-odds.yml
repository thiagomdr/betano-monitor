# Teste: screenshot Betano + Gemini Vision (IP do runner GitHub, nao IP da casa).
# Secrets necessarios em Settings -> Secrets -> Actions:
#   GEMINI_API_KEY  (obrigatorio)
name: Betano screenshot odds (test)

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: Betano eventId
        required: true
        default: "88494497"
      slug:
        description: Slug da URL /live/{slug}/{eventId}/
        required: true
        default: "suica-colombia"

concurrency:
  group: betano-screenshot-odds
  cancel-in-progress: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Screenshot + Gemini
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVENT_ID: ${{ inputs.event_id }}
          SLUG: ${{ inputs.slug }}
          OUTPUT_DIR: ${{ github.workspace }}/out/betano-screenshot
          HEADLESS: "1"
          GEMINI_MODELS: gemini-2.0-flash-lite,gemini-2.0-flash,gemini-1.5-flash
        run: node screenshot-betano-odds.mjs

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betano-screenshot-${{ inputs.event_id }}-${{ github.run_id }}
          path: |
            out/betano-screenshot/*.png
            out/betano-screenshot/*.json
          retention-days: 14
