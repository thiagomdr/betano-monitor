<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor Betano · Mercado de Gols +0,5</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121a24;
      --border: #243044;
      --text: #e8eef7;
      --muted: #8fa3bf;
      --accent: #3dd68c;
      --warn: #ffd166;
      --betano-orange: #ff5500;
      --super-blue: #0B57DD;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .brand-title {
      margin: 0 0 0.15rem;
      font-size: 1.85rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .brand-monitor { color: #fff; }
    a.brand-betano {
      color: var(--betano-orange);
      text-decoration: none;
    }
    a.brand-betano:hover { text-decoration: underline; }
    .page-subtitle {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .subtitle { color: rgba(143, 163, 191, 0.85); font-size: 0.8rem; margin: 0; }
    .status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .status.error { color: #ff6b6b; }
    main { padding: 1rem 1.25rem 2rem; }
    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0 0 0.75rem;
    }
    .summary-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 0.75rem;
    }
    .summary-label {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .summary-value {
      margin-top: 0.25rem;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .summary-card.summary-super {
      border-color: var(--super-blue);
    }
    .summary-card.summary-super .summary-label,
    .summary-card.summary-super .summary-value {
      color: var(--super-blue);
    }
    .summary-card.summary-imediato {
      border-color: #fff;
    }
    .summary-card.summary-imediato .summary-label,
    .summary-card.summary-imediato .summary-value {
      color: #fff;
    }
    .summary-card.summary-sem-linha {
      background: rgba(143, 163, 191, 0.25);
    }
    .summary-card.summary-pendentes {
      border-color: var(--betano-orange);
    }
    .summary-card.summary-pendentes .summary-label,
    .summary-card.summary-pendentes .summary-value {
      color: var(--betano-orange);
    }
    .summary-card .summary-value .summary-green { color: var(--accent); }
    .summary-card .summary-value .summary-red { color: #ff6b6b; }
    .summary-card .summary-label .summary-green { color: var(--accent); }
    .summary-card .summary-label .summary-red { color: #ff6b6b; }
    .mercado-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    th, td {
      padding: 0.5rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      position: sticky;
      top: 0;
      background: var(--panel);
    }
    tr:last-child td { border-bottom: none; }
    #mercado-tbody tr:hover td {
      background: rgba(232, 238, 247, 0.08);
    }
    .muted { color: var(--muted); }
    .odd { color: var(--accent); font-weight: 600; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
    a { color: var(--accent); }
    .resultado-badge {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .resultado-badge.pending { background: rgba(255, 209, 102, 0.2); color: var(--warn); }
    .resultado-badge.win { background: rgba(61, 214, 140, 0.2); color: var(--accent); }
    .resultado-badge.loss { background: rgba(220, 53, 69, 0.2); color: #ff6b6b; }
    .resultado-badge.sem-linha { background: rgba(143, 163, 191, 0.2); color: var(--muted); }
    .resultado-badge.watching { background: rgba(94, 179, 255, 0.15); color: #5eb3ff; }
    .estrategia-badge {
      display: inline-block;
      font-size: 0.76rem;
      font-weight: 700;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
    }
    .estrategia-badge.super { background: var(--super-blue); color: #fff; }
    .estrategia-badge.imediato {
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
    }
    button.estrategia-popover-btn {
      border: none;
      cursor: pointer;
      font: inherit;
    }
    button.estrategia-popover-btn:hover { filter: brightness(1.12); }
    .mercado-elevated-popover {
      display: none;
      position: fixed;
      z-index: 1000;
      max-width: 360px;
      max-height: 280px;
      overflow: auto;
      padding: 0.65rem 0.75rem;
      background: #1a2332;
      border: 1px solid rgba(94, 179, 255, 0.35);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      font-size: 0.78rem;
      line-height: 1.45;
    }
    .mercado-elevated-popover.open { display: block; }
    .mercado-elevated-popover h4 {
      margin: 0 0 0.5rem;
      font-size: 0.82rem;
      color: #fff;
    }
    .mercado-elevated-popover ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .mercado-elevated-popover li {
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .mercado-elevated-popover li:last-child { border-bottom: none; }
    .mercado-delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.2rem 0.35rem;
      font-size: 1rem;
      line-height: 1;
      border-radius: 4px;
    }
    .mercado-delete-btn:hover {
      color: #ff6b6b;
      background: rgba(220, 53, 69, 0.15);
    }
    .mercado-delete-btn:disabled {
      opacity: 0.45;
      cursor: wait;
    }
    .mercado-profit.positive { color: var(--accent); font-weight: 700; }
    .mercado-profit.negative { color: #ff6b6b; font-weight: 700; }

    @media (max-width: 640px) {
      header, main { padding: 0.75rem; }
      .brand-title { font-size: 1.5rem; }
      .page-subtitle { font-size: 0.92rem; }
      .subtitle { font-size: 0.75rem; }
      .status { font-size: 0.8rem; }
      .hint { font-size: 0.8rem; }
      .mercado-summary {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
      .summary-card { padding: 0.6rem; }
      .summary-value { font-size: 1rem; }
      .table-wrap {
        overflow: visible;
        border: none;
        background: transparent;
      }
      table { font-size: 0.82rem; }
      thead { display: none; }
      #mercado-tbody tr {
        display: block;
        margin-bottom: 0.75rem;
        padding: 0.65rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }
      #mercado-tbody tr:hover td { background: transparent; }
      #mercado-tbody td {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
        padding: 0.5rem 0;
        white-space: normal;
        border-bottom: 1px solid rgba(36, 48, 68, 0.5);
        text-align: left;
      }
      #mercado-tbody td:last-child { border-bottom: none; }
      #mercado-tbody td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        text-align: left;
      }
      #mercado-tbody td[data-label=""]::before { content: none; }
      #mercado-tbody td.empty {
        display: block;
        text-align: center;
      }
      #mercado-tbody td.empty::before { content: none; }
      .mercado-elevated-popover {
        left: 0.75rem !important;
        right: 0.75rem !important;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="brand-title">
      <span class="brand-monitor">Monitor</span>
      <a class="brand-betano" href="https://www.betano.bet.br/" target="_blank" rel="noopener noreferrer">Betano</a>
    </h1>
    <p class="page-subtitle">Mercado de Gols +0,5</p>
    <p class="subtitle">Betano via Supabase · coleta na nuvem</p>
    <div class="status" id="status">Carregando…</div>
  </header>
  <main>
    <p class="hint">
      Monitoramento automatico da linha <strong>Over +0,5</strong> (placar + 0,5).
      Novos jogos entram sozinhos; use a lixeira para ocultar da lista.
    </p>
    <section class="mercado-summary" id="mercado-summary" aria-live="polite"></section>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Jogo</th>
            <th>Estrategia</th>
            <th>Liga</th>
            <th>Gol GREEN</th>
            <th>Resultado</th>
            <th>Lucro 1u</th>
            <th>Placar</th>
            <th title="Ao vivo com minuto ou data de encerramento">Status</th>
            <th>Link</th>
            <th title="Ocultar da lista"></th>
          </tr>
        </thead>
        <tbody id="mercado-tbody">
          <tr><td colspan="11" class="empty">Carregando…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="mercado-elevated-popover" class="mercado-elevated-popover" role="dialog" aria-hidden="true"></div>
  </main>
  <script>
    let appCfg = null;
    let mercadoCache = [];
    let mercadoLoading = false;

    function formatNumber(n) {
      if (n == null || Number.isNaN(Number(n))) return '—';
      return Number(n).toLocaleString('pt-BR', { maximumFractionDigits: 2 });
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString('pt-BR');
    }

    function formatTimeOnly(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function formatOdd(n) {
      if (n == null) return '<span class="muted">—</span>';
      return `<span class="odd">${formatNumber(n)}</span>`;
    }

    function formatMercadoGolGreen(row) {
      if (row.gol_green_minute == null) return '—';
      const time = formatTimeOnly(row.settled_at);
      return time ? `${row.gol_green_minute}' ${time}` : `${row.gol_green_minute}'`;
    }

    function formatMercadoProfit(value) {
      if (value == null) return '<span class="muted">—</span>';
      const rounded = Math.round(value * 100) / 100;
      const sign = rounded > 0 ? '+' : '';
      const cls = rounded >= 0 ? 'positive' : 'negative';
      return `<span class="mercado-profit ${cls}">${sign}${formatNumber(rounded)} u</span>`;
    }

    function goalsTotalFromScoreText(text) {
      const m = String(text || '').match(/(\d+)\s*[-–]\s*(\d+)/);
      if (!m) return null;
      return Number(m[1]) + Number(m[2]);
    }

    async function initAppCfg() {
      if (appCfg) return appCfg;
      const cfgRes = await fetch('./supabase.config.json');
      if (!cfgRes.ok) throw new Error('web/supabase.config.json nao encontrado');
      appCfg = await cfgRes.json();
      if (!appCfg.url || !appCfg.anonKey || appCfg.anonKey.includes('COLE_AQUI')) {
        throw new Error('Configure url e anonKey em web/supabase.config.json');
      }
      return appCfg;
    }

    async function supabaseGet(url, anonKey, path) {
      const res = await fetch(`${url}/rest/v1/${path}`, {
        headers: {
          apikey: anonKey,
          Authorization: `Bearer ${anonKey}`,
          Accept: 'application/json',
        },
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Supabase ${res.status}: ${text.slice(0, 200)}`);
      }
      return res.json();
    }

    async function supabasePatch(url, anonKey, path, body) {
      const res = await fetch(`${url}/rest/v1/${path}`, {
        method: 'PATCH',
        headers: {
          apikey: anonKey,
          Authorization: `Bearer ${anonKey}`,
          'Content-Type': 'application/json',
          Prefer: 'return=representation',
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Supabase ${res.status}: ${text.slice(0, 200)}`);
      }
      const rows = await res.json();
      return Array.isArray(rows) ? rows : [];
    }

    async function deleteMercadoRow(eventId, label) {
      if (!appCfg || !eventId) return;
      const msg = label
        ? `Remover "${label}" da lista?\n\nO cron nao recria esta linha.`
        : 'Remover este jogo da lista?';
      if (!window.confirm(msg)) return;
      const updated = await supabasePatch(
        appCfg.url,
        appCfg.anonKey,
        `futebol_mercado_gols_05?event_id=eq.${encodeURIComponent(eventId)}`,
        { resultado: 'excluido', updated_at: new Date().toISOString() },
      );
      if (!updated.length) {
        throw new Error('Nenhuma linha foi atualizada no Supabase.');
      }
      mercadoCache = mercadoCache.filter((r) => String(r.event_id) !== String(eventId));
      renderMercado();
    }

    function mercadoResultadoLabel(resultado) {
      const map = {
        pending: 'Pendente',
        win: 'GREEN',
        loss: 'RED',
        sem_linha_05: 'Sem +0,5 no jogo',
        watching: 'Monitorando',
        skipped: 'Sem +0,5 no jogo',
      };
      const badgeCls = {
        pending: 'pending',
        win: 'win',
        loss: 'loss',
        sem_linha_05: 'sem-linha',
        watching: 'watching',
        skipped: 'sem-linha',
      };
      const text = map[resultado] || resultado || '—';
      const cls = badgeCls[resultado];
      return cls ? `<span class="resultado-badge ${cls}">${text}</span>` : text;
    }

    function mercadoSimProfit(row) {
      const odd = Number(row.over_05_odd);
      if (!Number.isFinite(odd) || odd < 1.01) return null;
      if (row.resultado === 'win') return odd - 1;
      if (row.resultado === 'loss') return -1;
      return null;
    }

    function parseElevatedOddsLog(raw) {
      if (!Array.isArray(raw)) return [];
      return raw.filter((e) => e && typeof e.line === 'number' && typeof e.odd === 'number');
    }

    function estrategiaPopoverBtn(eventId, label, cssClass) {
      return `<button type="button" class="estrategia-badge ${cssClass} estrategia-popover-btn" data-super-popover="${eventId}" title="Registro das odds +0,5">${label}</button>`;
    }

    function superEstrategiaBadge(eventId) {
      return estrategiaPopoverBtn(eventId, 'Super Estrategia', 'super');
    }

    function dedupeConsecutiveElevatedLines(log) {
      const out = [];
      for (const e of log) {
        const prev = out[out.length - 1];
        if (prev &&
          Math.abs(prev.line - e.line) < 0.01 &&
          prev.odd != null && e.odd != null &&
          Math.abs(prev.odd - e.odd) < 0.01) continue;
        out.push(e);
      }
      return out;
    }

    function mercadoLiveOddsFromRow(row) {
      if (!row) return null;
      return {
        over_0_odd: row.live_over_0_odd,
        over_0_line: row.live_over_0_line,
        over_1_odd: row.live_over_1_odd,
        over_1_line: row.live_over_1_line,
        over_2_odd: row.live_over_2_odd,
        over_2_line: row.live_over_2_line,
        minute: row.last_minute,
        score: row.live_score,
      };
    }

    function mercadoLiveTrueOver05(row) {
      const live = mercadoLiveOddsFromRow(row);
      if (!live || live.over_0_odd == null || live.over_0_line == null) return null;
      const goalsTotal = goalsTotalFromScoreText(live.score);
      if (goalsTotal == null) return { odd: live.over_0_odd, line: live.over_0_line };
      const needLine = goalsTotal + 0.5;
      if (Math.abs(live.over_0_line - needLine) > 0.01) {
        const slots = [
          { line: live.over_0_line, odd: live.over_0_odd },
          { line: live.over_1_line, odd: live.over_1_odd },
          { line: live.over_2_line, odd: live.over_2_odd },
        ];
        const hit = slots.find((s) =>
          s.line != null && s.odd != null && Math.abs(s.line - needLine) < 0.01,
        );
        if (!hit) return null;
        return { odd: hit.odd, line: hit.line };
      }
      return { odd: live.over_0_odd, line: live.over_0_line };
    }

    function buildSuperPopoverLog(row) {
      const log = dedupeConsecutiveElevatedLines(parseElevatedOddsLog(row?.elevated_odds_log));
      if (!row) return log;

      if (row.over_05_odd != null) {
        const entry = {
          at: row.captured_at,
          minute: row.disponivel_desde_minuto ?? row.last_minute,
          score: row.placar_na_captura,
          line: row.over_05_line,
          odd: row.over_05_odd,
          capture: true,
        };
        const last = log[log.length - 1];
        if (last &&
          Math.abs((last.line ?? 0) - (entry.line ?? 0)) < 0.01 &&
          Math.abs(last.odd - entry.odd) < 0.01) {
          log[log.length - 1] = { ...last, capture: true };
        } else {
          log.push(entry);
        }
        return log;
      }

      if (row.resultado === 'watching' && row.is_live) {
        const liveOver = mercadoLiveTrueOver05(row);
        if (liveOver) {
          const live = mercadoLiveOddsFromRow(row);
          log.push({
            at: new Date().toISOString(),
            minute: live?.minute ?? row.last_minute,
            score: live?.score ?? '—',
            line: liveOver.line,
            odd: liveOver.odd,
            live: true,
          });
        }
      }
      return log;
    }

    function renderElevatedPopoverHtml(row) {
      const log = buildSuperPopoverLog(row);
      const match = row ? `${row.home || '—'} x ${row.away || '—'}` : '';
      if (!log.length) {
        return `<h4>Registro +0,5 · ${match}</h4><p class="muted">Nenhum registro ainda.</p>`;
      }
      const items = log.slice().reverse().map((e) => {
        const when = formatDate(e.at);
        const min = e.minute != null ? `${e.minute}'` : '—';
        const score = e.score || '—';
        const lineLabel = e.line != null ? `Mais de ${formatNumber(e.line)}` : '+0,5';
        const tag = e.capture
          ? ' <span class="muted">(captura)</span>'
          : (e.live ? ' <span class="muted">(agora)</span>' : '');
        return `<li><strong>${lineLabel}</strong> @ ${formatOdd(e.odd)}${tag}<br><span class="muted">${when} · ${min} · ${score}</span></li>`;
      }).join('');
      return `<h4>Registro +0,5 · ${match}</h4><ul>${items}</ul>`;
    }

    function hideMercadoElevatedPopover() {
      const el = document.getElementById('mercado-elevated-popover');
      if (!el) return;
      el.classList.remove('open');
      el.setAttribute('aria-hidden', 'true');
    }

    function showMercadoElevatedPopover(btn, eventId) {
      const pop = document.getElementById('mercado-elevated-popover');
      if (!pop) return;
      const row = mercadoCache.find((r) => String(r.event_id) === String(eventId));
      pop.innerHTML = renderElevatedPopoverHtml(row);
      const rect = btn.getBoundingClientRect();
      pop.style.left = `${Math.min(rect.left, window.innerWidth - 380)}px`;
      pop.style.top = `${rect.bottom + 6}px`;
      pop.classList.add('open');
      pop.setAttribute('aria-hidden', 'false');
    }

    function mercadoEstrategiaLabel(row) {
      const { estrategia, resultado, had_min_plus2_before: hadPhase, event_id: eventId } = row;
      if (estrategia === 'super_05') return superEstrategiaBadge(eventId);
      if (estrategia === 'imediato_05') {
        return estrategiaPopoverBtn(eventId, 'Imediato', 'imediato');
      }
      if (resultado === 'sem_linha_05' || resultado === 'skipped') {
        return '<span class="muted">—</span>';
      }
      if (resultado === 'watching') {
        if (hadPhase) {
          return `${superEstrategiaBadge(eventId)} <span class="muted">(aguardando +0,5)</span>`;
        }
        return '<span class="muted">aguardando +0,5</span>';
      }
      return '<span class="muted">—</span>';
    }

    function mercadoStrategyStats(rows, estrategia) {
      const scoped = rows.filter((r) =>
        r.estrategia === estrategia && (r.resultado === 'win' || r.resultado === 'loss'),
      );
      const greens = scoped.filter((r) => r.resultado === 'win').length;
      const profit = scoped.reduce((sum, r) => sum + (mercadoSimProfit(r) ?? 0), 0);
      const roi = scoped.length > 0 ? (100 * profit) / scoped.length : null;
      return { bets: scoped.length, greens, profit, roi };
    }

    function renderMercadoSummary(rows) {
      const el = document.getElementById('mercado-summary');
      if (!el) return;
      const settled = rows.filter((r) => r.resultado === 'win' || r.resultado === 'loss');
      const capturas = rows.filter((r) => r.captured_at != null).length;
      const semLinha = rows.filter((r) =>
        r.resultado === 'sem_linha_05' || r.resultado === 'skipped',
      ).length;
      const superS = mercadoStrategyStats(rows, 'super_05');
      const imedS = mercadoStrategyStats(rows, 'imediato_05');
      const greens = rows.filter((r) => r.resultado === 'win').length;
      const reds = rows.filter((r) => r.resultado === 'loss').length;
      const pending = rows.filter((r) => r.resultado === 'pending' || r.resultado === 'watching').length;
      const profit = settled.reduce((sum, r) => sum + (mercadoSimProfit(r) ?? 0), 0);
      const roi = settled.length > 0 ? (100 * profit) / settled.length : 0;
      const profitClass = profit >= 0 ? 'positive' : 'negative';
      const sign = profit > 0 ? '+' : '';
      const fmtRoi = (v) => (v != null ? `${formatNumber(v)}%` : '—');
      const fmtG = (s) => (s.bets > 0 ? `${s.greens}/${s.bets}` : '—');
      el.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">Jogos monitorados</div>
          <div class="summary-value">${formatNumber(rows.length)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Capturas +0,5</div>
          <div class="summary-value">${formatNumber(capturas)}</div>
        </div>
        <div class="summary-card summary-super">
          <div class="summary-label">Super · GREEN</div>
          <div class="summary-value">${fmtG(superS)}</div>
        </div>
        <div class="summary-card summary-super">
          <div class="summary-label">Super · ROI</div>
          <div class="summary-value">${fmtRoi(superS.roi)}</div>
        </div>
        <div class="summary-card summary-imediato">
          <div class="summary-label">Imediato · GREEN</div>
          <div class="summary-value">${fmtG(imedS)}</div>
        </div>
        <div class="summary-card summary-imediato">
          <div class="summary-label">Imediato · ROI</div>
          <div class="summary-value">${fmtRoi(imedS.roi)}</div>
        </div>
        <div class="summary-card summary-sem-linha">
          <div class="summary-label">Sem +0,5 no jogo</div>
          <div class="summary-value">${formatNumber(semLinha)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label"><span class="summary-green">GREEN</span> / <span class="summary-red">RED</span></div>
          <div class="summary-value"><span class="summary-green">${greens}</span> / <span class="summary-red">${reds}</span></div>
        </div>
        <div class="summary-card summary-pendentes">
          <div class="summary-label">Pendentes</div>
          <div class="summary-value">${formatNumber(pending)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Lucro 1u (liquidadas)</div>
          <div class="summary-value mercado-profit ${profitClass}">${sign}${formatNumber(profit)} u</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">ROI (total)</div>
          <div class="summary-value">${settled.length ? formatNumber(roi) + '%' : '—'}</div>
        </div>
      `;
    }

    function mercadoSortKey(row) {
      return row.updated_at || row.captured_at || row.created_at || '';
    }

    function mercadoStatusLabel(row) {
      if (row.is_live) {
        const m = row.last_minute;
        return m != null
          ? `<span class="muted">Ao Vivo ${m}'</span>`
          : '<span class="muted">Ao Vivo</span>';
      }
      return formatDate(row.updated_at || row.created_at);
    }

    function mercadoPlacarLabel(row) {
      if (row.is_live && row.live_score) return row.live_score;
      return row.placar_final || '—';
    }

    function mercadoVisibleRows(rows) {
      return rows.filter((r) => r.resultado !== 'excluido');
    }

    function renderMercado() {
      const tbody = document.getElementById('mercado-tbody');
      if (!tbody) return;
      const rows = mercadoVisibleRows(mercadoCache).slice().sort((a, b) =>
        String(mercadoSortKey(b)).localeCompare(String(mercadoSortKey(a))),
      );
      renderMercadoSummary(rows);
      if (!rows.length) {
        tbody.innerHTML =
          '<tr><td colspan="11" class="empty">Nenhum jogo monitorado ainda. Novos jogos serao registrados automaticamente.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map((row, i) => {
        const match = `${row.home || '—'} x ${row.away || '—'}`;
        const league = [row.country, row.league].filter(Boolean).join(' · ') || '—';
        const link = row.betano_url
          ? `<a href="${row.betano_url}" target="_blank" rel="noopener">abrir</a>`
          : '—';
        return `<tr>
          <td data-label="#">${i + 1}</td>
          <td data-label="Jogo"><strong>${match}</strong></td>
          <td data-label="Estrategia">${mercadoEstrategiaLabel(row)}</td>
          <td data-label="Liga">${league}</td>
          <td data-label="Gol GREEN">${formatMercadoGolGreen(row)}</td>
          <td data-label="Resultado">${mercadoResultadoLabel(row.resultado)}</td>
          <td data-label="Lucro 1u">${formatMercadoProfit(mercadoSimProfit(row))}</td>
          <td data-label="Placar">${mercadoPlacarLabel(row)}</td>
          <td data-label="Status">${mercadoStatusLabel(row)}</td>
          <td data-label="Link">${link}</td>
          <td data-label=""><button type="button" class="mercado-delete-btn" data-delete-mercado="${row.event_id}" data-delete-label="${match.replace(/"/g, '&quot;')}" title="Remover da lista">🗑</button></td>
        </tr>`;
      }).join('');
    }

    function updateMercadoStatus(meta, visibleCount) {
      const status = document.getElementById('status');
      if (!status) return;
      if (meta?.last_error) {
        status.className = 'status error';
        status.textContent = `Ultimo erro da coleta: ${meta.last_error}`;
        return;
      }
      status.className = 'status';
      const when = meta?.fetched_at ? formatDate(meta.fetched_at) : '—';
      const source = meta?.source || 'betano-danae';
      status.textContent =
        `${formatNumber(visibleCount)} jogos na lista · atualizado ${when} · fonte ${source}`;
    }

    async function loadMercado() {
      if (mercadoLoading) return;
      mercadoLoading = true;
      const tbody = document.getElementById('mercado-tbody');
      try {
        await initAppCfg();
        const [rows, metaRows] = await Promise.all([
          supabaseGet(
            appCfg.url,
            appCfg.anonKey,
            'futebol_mercado_gols_05?select=*&order=updated_at.desc&limit=500',
          ),
          supabaseGet(
            appCfg.url,
            appCfg.anonKey,
            'futebol_live_meta?id=eq.1&select=fetched_at,source,last_error',
          ),
        ]);
        mercadoCache = rows ?? [];
        const visible = mercadoVisibleRows(mercadoCache);
        updateMercadoStatus(metaRows?.[0], visible.length);
        renderMercado();
      } catch (err) {
        const status = document.getElementById('status');
        if (status) {
          status.className = 'status error';
          status.textContent = err.message || String(err);
        }
        if (tbody) {
          tbody.innerHTML =
            `<tr><td colspan="11" class="empty">${err.message || String(err)}</td></tr>`;
        }
      } finally {
        mercadoLoading = false;
      }
    }

    document.getElementById('mercado-tbody')?.closest('main')?.addEventListener('click', async (e) => {
      const popBtn = e.target.closest('[data-super-popover]');
      if (popBtn) {
        e.preventDefault();
        e.stopPropagation();
        const eventId = popBtn.getAttribute('data-super-popover');
        const pop = document.getElementById('mercado-elevated-popover');
        if (pop?.classList.contains('open') && pop.dataset.eventId === eventId) {
          hideMercadoElevatedPopover();
        } else {
          if (pop) pop.dataset.eventId = eventId;
          showMercadoElevatedPopover(popBtn, eventId);
        }
        return;
      }
      const btn = e.target.closest('[data-delete-mercado]');
      if (!btn || btn.disabled) return;
      const eventId = btn.getAttribute('data-delete-mercado');
      const label = btn.getAttribute('data-delete-label') || '';
      btn.disabled = true;
      try {
        await deleteMercadoRow(eventId, label);
      } catch (err) {
        window.alert(err.message || String(err));
        btn.disabled = false;
      }
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('[data-super-popover]') || e.target.closest('#mercado-elevated-popover')) return;
      hideMercadoElevatedPopover();
    }, true);

    loadMercado();
    setInterval(loadMercado, 60000);
  </script>
</body>
</html>
