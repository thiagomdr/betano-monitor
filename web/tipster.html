<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Tipster · Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0b0e11;
      --bg-2: #12171c;
      --bg-3: #181e25;
      --line: #273039;
      --line-soft: #1f272f;
      --text: #e8eef4;
      --muted: #8494a6;
      --accent: #3ecf8e;
      --accent-dim: color-mix(in srgb, var(--accent) 18%, transparent);
      --warn: #e6b84a;
      --loss: #e85d5d;
      --focus: #5b9fd4;
      --esports: #5b45c4;
      --row-h: 52px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background:
        radial-gradient(900px 480px at 0% 0%, #152028 0%, transparent 55%),
        linear-gradient(180deg, #090b0d 0%, var(--bg) 35%);
      color: var(--text);
    }
    .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
    [hidden] { display: none !important; }

    /* —— Login —— */
    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .login-box {
      width: min(400px, 100%);
      border: 1px solid var(--line);
      background: var(--bg-2);
      padding: 1.75rem 1.5rem;
    }
    .login-box h1 {
      margin: 0 0 0.2rem;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }
    .login-box h1 span { color: var(--accent); }
    .login-box p { margin: 0 0 1.15rem; color: var(--muted); font-size: 0.9rem; }
    .login-box label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .login-box input {
      width: 100%;
      margin-bottom: 0.8rem;
      padding: 0.6rem 0.7rem;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .login-box input:focus, .btn:focus-visible, .chip:focus-visible, .tabs button:focus-visible {
      outline: 1px solid var(--focus);
      outline-offset: 1px;
    }
    .login-box button[type="submit"] { width: 100%; margin-top: 0.25rem; }
    .btn {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      padding: 0.45rem 0.8rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: var(--accent-dim); }
    .btn-muted { border-color: var(--line); color: var(--muted); }
    .btn-muted:hover { background: var(--bg-3); color: var(--text); }
    .err { color: var(--loss); font-size: 0.85rem; margin-top: 0.55rem; }

    /* —— App bar —— */
    header.app-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem 1rem;
      align-items: center;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg-2) 92%, transparent);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.55rem 1rem;
      min-width: 0;
    }
    header .brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
      white-space: nowrap;
    }
    header .brand span { color: var(--accent); }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.85rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .stats b { color: var(--text); font-weight: 600; }
    .stats .pnl-pos b { color: var(--accent); }
    .stats .pnl-neg b { color: var(--loss); }
    .nav-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      justify-self: end;
    }
    .tabs { display: flex; gap: 0.25rem; }
    .tabs button {
      border: 1px solid transparent;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 0.4rem 0.65rem;
      font: inherit;
      font-size: 0.84rem;
      cursor: pointer;
    }
    .tabs button.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .tabs button:hover { color: var(--text); }

    main { padding: 0.75rem 1rem 4.5rem; max-width: 1400px; margin: 0 auto; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.85rem;
      align-items: center;
      margin-bottom: 0.55rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .toolbar select {
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 0.28rem 0.4rem;
      font: inherit;
    }

    /* —— Terminal board —— */
    .board {
      border: none;
      background: transparent;
      overflow: visible;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    #events {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      background: transparent;
    }
    .board-head {
      display: grid;
      grid-template-columns:
        64px minmax(200px, 1.6fr) minmax(280px, 2.2fr);
      gap: 0.5rem 0.65rem;
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--line);
      background: var(--bg-3);
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: relative;
      z-index: 1;
    }
    .odds-cols {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.35rem;
    }
    .row {
      display: grid;
      grid-template-columns:
        64px minmax(200px, 1.6fr) minmax(280px, 2.2fr);
      gap: 0.5rem 0.65rem;
      align-items: center;
      padding: 0.45rem 0.7rem;
      min-height: var(--row-h);
      border-bottom: 1px solid var(--line-soft);
    }
    .row:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
    .row:last-child { border-bottom: 0; }
    .section {
      border: 1px solid var(--line);
      margin-bottom: 0;
      background: var(--bg-2);
      overflow: hidden;
    }
    .section:last-child { margin-bottom: 0; }
    .section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.65rem;
      padding: 0.55rem 0.7rem;
      background: color-mix(in srgb, var(--bg-3) 88%, #000);
      border-bottom: 1px solid var(--line-soft);
      cursor: pointer;
      user-select: none;
    }
    .section-head:hover { background: color-mix(in srgb, var(--accent) 6%, var(--bg-3)); }
    .section.collapsed .section-head { border-bottom: 0; }
    .section-head.esports {
      background: color-mix(in srgb, var(--esports) 28%, #1a1228);
      border-bottom-color: color-mix(in srgb, var(--esports) 45%, var(--line));
    }
    .section-head.esports:hover {
      background: color-mix(in srgb, var(--esports) 38%, #1a1228);
    }
    .section-head.esports .country {
      color: color-mix(in srgb, var(--esports) 75%, #fff);
    }
    .section-head.esports .league {
      color: #d4ccff;
    }
    .section-head.esports .count {
      color: color-mix(in srgb, var(--esports) 70%, var(--muted));
    }
    .section-head.esports .section-toggle {
      border-color: color-mix(in srgb, var(--esports) 55%, var(--line));
      color: #d4ccff;
      background: color-mix(in srgb, var(--esports) 18%, var(--bg));
    }
    .section-toggle {
      flex: 0 0 auto;
      width: 1.35rem;
      height: 1.35rem;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--accent);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .section-head .country {
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: -0.01em;
    }
    .section-head .league {
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .section-head .count {
      margin-left: auto;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .section-body { display: block; }
    .section.collapsed .section-body { display: none; }
    .section .row { border-bottom: 1px solid var(--line-soft); }
    .section .row:last-child { border-bottom: 0; }
    .cell-min-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.28rem;
      min-width: 0;
      text-align: center;
    }
    .cell-min {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      color: var(--warn);
      font-weight: 600;
      line-height: 1.1;
      white-space: nowrap;
    }
    .btn-betano {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.16rem 0.4rem;
      border: none;
      border-radius: 2px;
      background: #ff5500;
      color: #fff;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      line-height: 1.15;
      white-space: nowrap;
    }
    .btn-betano:hover { filter: brightness(1.08); color: #fff; }
    .cell-score {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1.1;
      white-space: nowrap;
    }
    .match-meta-line {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .match-block {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 0.22rem;
      text-align: left;
    }
    .match-name {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.15;
    }
    .match-name .vs {
      color: var(--muted);
      font-weight: 500;
      margin: 0 0.2rem;
    }
    .team-home { color: #5b9fd4; }
    .team-away { color: #e85d5d; }
    .match-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.45rem;
      align-items: center;
      margin-top: 0.1rem;
      color: var(--muted);
      font-size: 0.72rem;
    }
    .badge {
      display: inline-block;
      padding: 0.08rem 0.35rem;
      border: none;
      border-radius: 0;
      background: var(--esports);
      color: #000000;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-transform: none;
      line-height: 1.2;
      flex: 0 0 auto;
    }
    .match-title-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      max-width: 100%;
      min-width: 0;
    }
    .match-title-row .match-name {
      flex: 1 1 auto;
      min-width: 0;
    }
    .odds-group {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.35rem;
      min-width: 0;
    }
    .mkt-col {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      min-width: 0;
    }
    .mkt-col .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      line-height: 1;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.22rem;
    }
    .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.02rem;
      min-width: 2.55rem;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--text);
      padding: 0.22rem 0.35rem 0.18rem;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      line-height: 1.05;
    }
    .chip:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .chip:disabled { opacity: 0.35; cursor: not-allowed; }
    .chip .k {
      color: var(--muted);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .chip .o {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.92rem;
    }

    /* —— Tables —— */
    .table-wrap {
      border: 1px solid var(--line);
      background: var(--bg-2);
      overflow: auto;
      max-height: calc(100vh - 150px);
    }
    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    table.data thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--bg-3);
      color: var(--muted);
      font-weight: 500;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 0.55rem;
      text-align: left;
    }
    table.data td {
      border-bottom: 1px solid var(--line-soft);
      padding: 0.5rem 0.55rem;
      vertical-align: top;
    }
    table.data tbody tr:hover td {
      background: color-mix(in srgb, var(--accent) 4%, transparent);
    }
    tr.rank-top td { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    tr.rank-me td { box-shadow: inset 2px 0 0 var(--focus); }
    .pnl-pos { color: var(--accent); }
    .pnl-neg { color: var(--loss); }
    .status-open { color: var(--warn); }
    .status-won { color: var(--accent); }
    .status-lost { color: var(--loss); }
    .status-void { color: var(--muted); }
    .empty {
      color: var(--muted);
      padding: 1.75rem 1rem;
      text-align: center;
      line-height: 1.45;
      font-size: 0.9rem;
    }

    /* —— Toast / slip —— */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 1.1rem;
      transform: translateX(-50%) translateY(120%);
      z-index: 50;
      min-width: min(420px, calc(100vw - 1.5rem));
      border: 1px solid var(--accent);
      background: var(--bg-2);
      padding: 0.7rem 0.9rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      transition: transform 0.22s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast .msg { font-size: 0.86rem; }
    .toast .msg strong { color: var(--accent); font-family: "IBM Plex Mono", monospace; }
    .toast.error { border-color: var(--loss); }
    .toast.error .msg strong { color: var(--loss); }

    @media (max-width: 960px) {
      .board-head { display: none; }
      .row, .odds-group {
        grid-template-columns: 1fr;
      }
      .row {
        gap: 0.4rem;
        padding: 0.7rem;
      }
      .match-name { white-space: normal; }
      .cell-min {
        display: inline-block;
        margin-right: 0.55rem;
      }
      .odds-group { gap: 0.55rem; }
    }
    @media (max-width: 640px) {
      header.app-bar {
        grid-template-columns: 1fr;
      }
      .nav-row { justify-self: stretch; justify-content: space-between; }
      main { padding: 0.65rem 0.65rem 4.5rem; }
    }
  </style>
</head>
<body>
  <div id="login" class="login-screen">
    <form class="login-box" id="login-form">
      <h1>Arena <span>Tipster</span></h1>
      <p>Terminal de paper trading · stake fixo 1 unidade</p>
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <label for="display-name">Apelido no ranking</label>
      <input id="display-name" type="text" maxlength="40" placeholder="Opcional" />
      <button class="btn" type="submit">Entrar no terminal</button>
      <div id="login-err" class="err" hidden></div>
    </form>
  </div>

  <div id="app" hidden>
    <header class="app-bar">
      <div class="brand-row">
        <h1 class="brand">Arena <span>Tipster</span></h1>
        <div class="stats" id="header-stats">
          <span id="stat-name">—</span>
          <span id="stat-pnl" class="">PnL dia <b>—</b></span>
          <span id="stat-open">Open <b>0</b></span>
          <span id="stat-feed">Feed <b>—</b></span>
        </div>
      </div>
      <div class="nav-row">
        <nav class="tabs" aria-label="Abas">
          <button type="button" data-tab="terminal" class="active">Terminal</button>
          <button type="button" data-tab="picks">Meus picks</button>
          <button type="button" data-tab="ranking">Ranking</button>
        </nav>
        <button type="button" class="btn btn-muted" id="btn-logout">Sair</button>
      </div>
    </header>

    <main>
      <section id="panel-terminal">
        <div class="toolbar">
          <span id="feed-meta" class="mono">Carregando feed…</span>
          <button type="button" class="btn" id="btn-refresh">Atualizar</button>
        </div>
        <div class="board" id="board">
          <div class="board-head">
            <div></div>
            <div>Jogo</div>
            <div class="odds-cols">
              <div>1X2</div>
              <div>Ambas</div>
              <div>Total</div>
              <div>Dupla</div>
            </div>
          </div>
          <div id="events"></div>
        </div>
      </section>

      <section id="panel-picks" hidden>
        <div class="toolbar"><span>Histórico · stake 1u · PnL sempre na odd snapshot</span></div>
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th>Quando</th>
                <th>Jogo</th>
                <th>Mercado</th>
                <th>Odd</th>
                <th>Status</th>
                <th>PnL</th>
              </tr>
            </thead>
            <tbody id="picks-body"></tbody>
          </table>
        </div>
      </section>

      <section id="panel-ranking" hidden>
        <div class="toolbar">
          <label>
            Período
            <select id="rank-period">
              <option value="all">Todo o concurso</option>
              <option value="7">Últimos 7 dias</option>
              <option value="30">Últimos 30 dias</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th>#</th>
                <th>Tipster</th>
                <th>PnL (u)</th>
                <th>Winrate</th>
                <th>Settled</th>
                <th>Open</th>
              </tr>
            </thead>
            <tbody id="rank-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <div class="msg" id="toast-msg"></div>
    <button type="button" class="btn btn-muted" id="toast-close">Ok</button>
  </div>

  <script>
    const SEL_LABEL = {
      home: "1", draw: "X", away: "2",
      over: "Mais", under: "Menos",
      yes: "Sim", no: "Não",
      "1x": "1X", x2: "X2", "12": "12",
    };
    const MKT_LABEL = {
      "1x2": "1X2",
      total: "Total",
      btts: "Ambas",
      double_chance: "Dupla",
    };
    const MKT_ORDER = ["1x2", "btts", "total", "double_chance"];

    let sb = null;
    let tipster = null;
    let pollTimer = null;
    let toastTimer = null;

    function fmtOdd(n) {
      const x = Number(n);
      return Number.isFinite(x) ? x.toFixed(2) : "—";
    }
    function fmtPnl(n) {
      if (n == null || n === "") return "—";
      const x = Number(n);
      if (!Number.isFinite(x)) return "—";
      return (x >= 0 ? "+" : "") + x.toFixed(2);
    }
    function fmtWhen(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("pt-BR", { hour12: false });
    }
    function fmtTimeShort(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleTimeString("pt-BR", { hour12: false });
    }
    function isEsports(home, away, league) {
      const t = `${home || ""} ${away || ""} ${league || ""}`.toLowerCase();
      return t.includes("esports") || t.includes("e-sports");
    }
    function stripEsportsLabel(name) {
      return String(name || "")
        .replace(/\s*\(\s*e-?sports\s*\)\s*/gi, " ")
        .replace(/\s{2,}/g, " ")
        .trim();
    }
    function startOfLocalDayIso() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d.toISOString();
    }

    function showToast(messageHtml, { error = false } = {}) {
      const el = document.getElementById("toast");
      document.getElementById("toast-msg").innerHTML = messageHtml;
      el.classList.toggle("error", !!error);
      el.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 4200);
    }

    async function loadClient() {
      const cfgRes = await fetch("./supabase.config.json");
      if (!cfgRes.ok) throw new Error("web/supabase.config.json não encontrado");
      const cfg = await cfgRes.json();
      if (!cfg.url || !cfg.anonKey) throw new Error("Configure url e anonKey");
      sb = window.supabase.createClient(cfg.url, cfg.anonKey, {
        auth: { persistSession: true, autoRefreshToken: true },
      });
    }

    async function ensureProfile(displayName) {
      const { data, error } = await sb.rpc("ensure_tipster", {
        p_display_name: displayName || null,
      });
      if (error) throw error;
      tipster = Array.isArray(data) ? data[0] : data;
      document.getElementById("stat-name").textContent = tipster.display_name;
      await refreshHeaderStats();
    }

    async function refreshHeaderStats() {
      if (!tipster) return;
      const since = startOfLocalDayIso();
      const { data: picks } = await sb
        .from("picks")
        .select("status,pnl_u,placed_at")
        .eq("tipster_id", tipster.id)
        .gte("placed_at", since);

      let openN = 0;
      let pnl = 0;
      for (const p of picks || []) {
        if (p.status === "open") openN += 1;
        if (p.status === "won" || p.status === "lost" || p.status === "void") {
          pnl += Number(p.pnl_u || 0);
        }
      }
      const pnlEl = document.getElementById("stat-pnl");
      pnlEl.className = pnl >= 0 ? "pnl-pos" : "pnl-neg";
      pnlEl.innerHTML = `PnL dia <b>${fmtPnl(pnl)}</b>`;
      document.getElementById("stat-open").innerHTML = `Open <b>${openN}</b>`;
    }

    function showApp(on) {
      document.getElementById("login").hidden = on;
      document.getElementById("app").hidden = !on;
    }

    function setTab(name) {
      document.querySelectorAll(".tabs button").forEach((b) => {
        b.classList.toggle("active", b.dataset.tab === name);
      });
      document.getElementById("panel-terminal").hidden = name !== "terminal";
      document.getElementById("panel-picks").hidden = name !== "picks";
      document.getElementById("panel-ranking").hidden = name !== "ranking";
      if (name === "picks") loadPicks();
      if (name === "ranking") loadRanking();
      if (name === "terminal") loadTerminal();
    }

    async function placePick(eventId, marketKey, selectionKey, line, labelHint) {
      const { data, error } = await sb.rpc("place_pick", {
        p_event_id: eventId,
        p_market_key: marketKey,
        p_selection_key: selectionKey,
        p_line: line,
        p_contest_slug: "arena-open",
      });
      if (error) {
        showToast(`<strong>Falha</strong> · ${error.message}`, { error: true });
        return;
      }
      const pick = Array.isArray(data) ? data[0] : data;
      const label = labelHint || `${MKT_LABEL[marketKey] || marketKey} ${SEL_LABEL[selectionKey] || selectionKey}`;
      showToast(`Pick <strong>${label}</strong> @ <strong>${fmtOdd(pick.odd_snapshot)}</strong> · 1u`);
      refreshHeaderStats();
      if (!document.getElementById("panel-picks").hidden) loadPicks();
    }

    function findSelection(mkt, key) {
      return (mkt?.selections || []).find((s) => s.selection_key === key) || null;
    }

    function chipHtml(evId, m, sel, label) {
      if (!m || !sel) {
        return `<button type="button" class="chip" disabled><span class="k">${label}</span><span class="o">—</span></button>`;
      }
      const disabled = m.status !== "open" || sel.status !== "open";
      return `<button type="button" class="chip" ${disabled ? "disabled" : ""}
        data-event="${evId}" data-mkt="${m.market_key}" data-sel="${sel.selection_key}"
        data-line="${m.line == null ? "" : m.line}" data-label="${label}">
        <span class="k">${label}</span>
        <span class="o">${fmtOdd(sel.odd)}</span>
      </button>`;
    }

    function renderMarketColumns(evId, markets) {
      const byKey = new Map();
      for (const m of markets || []) {
        if (!byKey.has(m.market_key)) byKey.set(m.market_key, []);
        byKey.get(m.market_key).push(m);
      }

      return MKT_ORDER.map((key) => {
        const items = byKey.get(key) || [];
        let chips = "";
        if (key === "1x2") {
          const m = items[0];
          chips = ["home", "draw", "away"].map((k) =>
            chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k])
          ).join("");
        } else if (key === "btts") {
          const m = items[0];
          chips = ["yes", "no"].map((k) =>
            chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k])
          ).join("");
        } else if (key === "double_chance") {
          const m = items[0];
          chips = ["1x", "x2", "12"].map((k) =>
            chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k])
          ).join("");
        } else if (key === "total") {
          // Prefer line closest to current score + 0.5 when multiple
          const sorted = [...items].sort((a, b) => (a.line ?? 99) - (b.line ?? 99));
          chips = sorted.slice(0, 2).map((m) => {
            const lineLabel = m.line != null ? String(m.line).replace(".", ",") : "";
            return ["over", "under"].map((k) => {
              const prefix = k === "over" ? "+" : "−";
              return chipHtml(evId, m, findSelection(m, k), `${prefix}${lineLabel}`);
            }).join("");
          }).join("");
          if (!chips) {
            chips = chipHtml(evId, null, null, "—");
          }
        }
        return `<div class="mkt-col">
          <div class="label">${MKT_LABEL[key]}</div>
          <div class="chips">${chips}</div>
        </div>`;
      }).join("");
    }

    async function loadTerminal() {
      const feedEl = document.getElementById("feed-meta");
      const root = document.getElementById("events");
      const feedStat = document.getElementById("stat-feed");

      const { data: meta } = await sb
        .from("tipster_live_meta")
        .select("fetched_at,live_total,last_error")
        .eq("id", 1)
        .maybeSingle();

      if (meta?.last_error) {
        feedEl.textContent = `Erro feed: ${meta.last_error}`;
        feedStat.innerHTML = `Feed <b>erro</b>`;
      } else if (meta?.fetched_at) {
        feedEl.textContent =
          `${meta.live_total || 0} jogos · atualizado ${fmtWhen(meta.fetched_at)}`;
        feedStat.innerHTML = `Feed <b>${fmtTimeShort(meta.fetched_at)}</b>`;
      } else {
        feedEl.textContent = "Aguardando collector…";
        feedStat.innerHTML = `Feed <b>—</b>`;
      }

      const { data: events, error } = await sb
        .from("live_events")
        .select("id,home,away,league,country,league_id,minute,home_score,away_score,status,updated_at,event_url,provider_event_id")
        .eq("status", "live")
        .order("minute", { ascending: true, nullsFirst: false });

      if (error) {
        root.innerHTML = `<div class="empty">Erro: ${error.message}</div>`;
        return;
      }
      if (!events?.length) {
        root.innerHTML = `<div class="empty">Nenhum jogo de futebol no catálogo agora.<br>
          Virtuais e outros esportes ficam de fora. Clique em Atualizar após o collector.</div>`;
        return;
      }

      const ids = events.map((e) => e.id);
      const { data: markets } = await sb
        .from("live_markets")
        .select("id,event_id,market_key,line,status")
        .in("event_id", ids);

      const mktIds = (markets || []).map((m) => m.id);
      const { data: selections } = mktIds.length
        ? await sb
          .from("live_selections")
          .select("market_id,selection_key,odd,status")
          .in("market_id", mktIds)
        : { data: [] };

      const selsByMkt = new Map();
      for (const s of selections || []) {
        if (!selsByMkt.has(s.market_id)) selsByMkt.set(s.market_id, []);
        selsByMkt.get(s.market_id).push(s);
      }
      const mktsByEvent = new Map();
      for (const m of markets || []) {
        const full = { ...m, selections: selsByMkt.get(m.id) || [] };
        if (!mktsByEvent.has(m.event_id)) mktsByEvent.set(m.event_id, []);
        mktsByEvent.get(m.event_id).push(full);
      }

      const groups = groupEventsByCountryLeague(events);
      root.innerHTML = groups.map((g) => {
        const rows = g.events.map((ev) => renderEventRow(ev, mktsByEvent.get(ev.id) || [])).join("");
        return `<section class="section" data-section-key="${escapeHtml(g.key)}">
          <div class="section-head ${g.esports ? "esports" : ""}" role="button" tabindex="0" aria-expanded="true">
            <button type="button" class="section-toggle" aria-label="Recolher liga">−</button>
            <span class="country">${escapeHtml(g.country)}</span>
            <span class="league">${escapeHtml(g.league)}</span>
            <span class="count">${g.events.length}</span>
          </div>
          <div class="section-body">${rows}</div>
        </section>`;
      }).join("");

      root.querySelectorAll(".section-head").forEach((head) => {
        const toggleSection = () => {
          const section = head.closest(".section");
          if (!section) return;
          const collapsed = section.classList.toggle("collapsed");
          const btn = head.querySelector(".section-toggle");
          head.setAttribute("aria-expanded", collapsed ? "false" : "true");
          if (btn) {
            btn.textContent = collapsed ? "+" : "−";
            btn.setAttribute("aria-label", collapsed ? "Expandir liga" : "Recolher liga");
          }
        };
        head.addEventListener("click", (e) => {
          e.preventDefault();
          toggleSection();
        });
        head.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleSection();
          }
        });
      });

      root.querySelectorAll(".chip:not(:disabled)").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const lineRaw = btn.dataset.line;
          const line = lineRaw === "" ? null : Number(lineRaw);
          const label = `${MKT_LABEL[btn.dataset.mkt] || btn.dataset.mkt} ${btn.dataset.label || btn.dataset.sel}`;
          placePick(btn.dataset.event, btn.dataset.mkt, btn.dataset.sel, line, label);
        });
      });

      refreshHeaderStats();
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function groupEventsByCountryLeague(events) {
      const map = new Map();
      for (const ev of events) {
        const esports = isEsports(ev.home, ev.away, ev.league) ||
          isEsports(ev.home, ev.away, ev.country);
        const country = esports
          ? "Esports"
          : (ev.country && String(ev.country).trim()) || "Outros";
        const league = (ev.league && String(ev.league).trim()) || "Sem liga";
        const key = `${esports ? "1" : "0"}|${country.toLowerCase()}|${league.toLowerCase()}`;
        if (!map.has(key)) {
          map.set(key, { key, esports, country, league, events: [] });
        }
        map.get(key).events.push(ev);
      }

      const groups = [...map.values()];
      groups.sort((a, b) => {
        if (a.esports !== b.esports) return a.esports ? 1 : -1; // real first, esports last
        const c = a.country.localeCompare(b.country, "pt-BR");
        if (c !== 0) return c;
        return a.league.localeCompare(b.league, "pt-BR");
      });
      for (const g of groups) {
        g.events.sort((x, y) => {
          const mx = x.minute == null ? 999 : Number(x.minute);
          const my = y.minute == null ? 999 : Number(y.minute);
          return mx - my;
        });
      }
      return groups;
    }

    function renderEventRow(ev, markets) {
      const score = `${ev.home_score ?? 0} x ${ev.away_score ?? 0}`;
      const min = ev.minute != null ? `${ev.minute}'` : "—";
      const cols = renderMarketColumns(ev.id, markets);
      const url = ev.event_url || "";
      const betanoBtn = url
        ? `<a class="btn-betano" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="Abrir na Betano">Betano</a>`
        : "";
      const esports = isEsports(ev.home, ev.away, ev.league) ||
        isEsports(ev.home, ev.away, ev.country);
      const home = stripEsportsLabel(ev.home);
      const away = stripEsportsLabel(ev.away);
      const esportsBadge = esports ? `<span class="badge">Esports</span>` : "";
      return `<article class="row">
        <div class="cell-min-wrap">
          ${betanoBtn}
        </div>
        <div class="match-block">
          <div class="match-title-row">
            <div class="match-name" title="${escapeHtml(home)} × ${escapeHtml(away)}"><span class="team-home">${escapeHtml(home)}</span><span class="vs"> × </span><span class="team-away">${escapeHtml(away)}</span></div>
            ${esportsBadge}
          </div>
          <div class="match-meta-line">
            <span class="cell-min">${min}</span>
            <span class="cell-score">${score}</span>
          </div>
        </div>
        <div class="odds-group">${cols}</div>
      </article>`;
    }

    async function loadPicks() {
      if (!tipster) return;
      const { data, error } = await sb
        .from("picks")
        .select("id,placed_at,market_key,selection_key,line,odd_snapshot,status,pnl_u,event_id,live_events(home,away)")
        .eq("tipster_id", tipster.id)
        .order("placed_at", { ascending: false })
        .limit(100);

      const body = document.getElementById("picks-body");
      if (error) {
        body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
        return;
      }
      if (!data?.length) {
        body.innerHTML = `<tr><td colspan="6" class="empty">Nenhum pick ainda — clique uma odd no Terminal.</td></tr>`;
        return;
      }
      body.innerHTML = data.map((p) => {
        const game = p.live_events
          ? `${p.live_events.home} × ${p.live_events.away}`
          : p.event_id;
        const line = p.line != null ? ` ${String(p.line).replace(".", ",")}` : "";
        const mkt =
          `${MKT_LABEL[p.market_key] || p.market_key} ${SEL_LABEL[p.selection_key] || p.selection_key}${line}`;
        const pnlClass = p.pnl_u == null ? "" : (Number(p.pnl_u) >= 0 ? "pnl-pos" : "pnl-neg");
        return `<tr>
          <td class="mono">${fmtWhen(p.placed_at)}</td>
          <td>${game}</td>
          <td>${mkt}</td>
          <td class="mono">${fmtOdd(p.odd_snapshot)}</td>
          <td class="status-${p.status}">${p.status}</td>
          <td class="mono ${pnlClass}">${fmtPnl(p.pnl_u)}</td>
        </tr>`;
      }).join("");
      refreshHeaderStats();
    }

    async function loadRanking() {
      const period = document.getElementById("rank-period").value;
      const body = document.getElementById("rank-body");

      if (period === "all") {
        const { data, error } = await sb
          .from("v_tipster_ranking")
          .select("*")
          .eq("contest_slug", "arena-open")
          .order("pnl_u", { ascending: false });
        if (error) {
          body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
          return;
        }
        renderRankRows(body, data || []);
        return;
      }

      const since = new Date();
      since.setDate(since.getDate() - Number(period));
      const { data: picks, error } = await sb
        .from("picks")
        .select("tipster_id,status,pnl_u,tipsters(display_name)")
        .gte("placed_at", since.toISOString());
      if (error) {
        body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
        return;
      }
      const agg = new Map();
      for (const p of picks || []) {
        if (!agg.has(p.tipster_id)) {
          agg.set(p.tipster_id, {
            tipster_id: p.tipster_id,
            display_name: p.tipsters?.display_name || "—",
            pnl_u: 0,
            wins: 0,
            settled_n: 0,
            open_n: 0,
          });
        }
        const row = agg.get(p.tipster_id);
        if (p.status === "open") row.open_n += 1;
        if (p.status === "won" || p.status === "lost" || p.status === "void") {
          row.pnl_u += Number(p.pnl_u || 0);
        }
        if (p.status === "won" || p.status === "lost") {
          row.settled_n += 1;
          if (p.status === "won") row.wins += 1;
        }
      }
      const rows = [...agg.values()].map((r) => ({
        ...r,
        winrate: r.settled_n ? r.wins / r.settled_n : null,
      })).sort((a, b) => b.pnl_u - a.pnl_u);
      renderRankRows(body, rows);
    }

    function renderRankRows(body, rows) {
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="6" class="empty">Sem tipsters inscritos.</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((r, i) => {
        const pnlClass = Number(r.pnl_u) >= 0 ? "pnl-pos" : "pnl-neg";
        const wr = r.winrate == null ? "—" : `${(Number(r.winrate) * 100).toFixed(0)}%`;
        const cls = [
          i < 3 ? "rank-top" : "",
          tipster && r.tipster_id === tipster.id ? "rank-me" : "",
        ].filter(Boolean).join(" ");
        return `<tr class="${cls}">
          <td class="mono">${i + 1}</td>
          <td>${r.display_name}${tipster && r.tipster_id === tipster.id ? " · você" : ""}</td>
          <td class="mono ${pnlClass}">${fmtPnl(r.pnl_u)}</td>
          <td class="mono">${wr}</td>
          <td class="mono">${r.settled_n ?? 0}</td>
          <td class="mono">${r.open_n ?? 0}</td>
        </tr>`;
      }).join("");
    }

    function startPoll() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => {
        const term = document.getElementById("panel-terminal");
        if (!term.hidden) loadTerminal();
        else refreshHeaderStats();
      }, 30000);
    }

    document.querySelectorAll(".tabs button").forEach((b) => {
      b.addEventListener("click", () => setTab(b.dataset.tab));
    });
    document.getElementById("btn-refresh").addEventListener("click", loadTerminal);
    document.getElementById("rank-period").addEventListener("change", loadRanking);
    document.getElementById("toast-close").addEventListener("click", () => {
      document.getElementById("toast").classList.remove("show");
    });
    document.getElementById("btn-logout").addEventListener("click", async () => {
      await sb.auth.signOut();
      tipster = null;
      showApp(false);
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-err");
      errEl.hidden = true;
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const displayName = document.getElementById("display-name").value.trim();
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await ensureProfile(displayName || null);
        showApp(true);
        setTab("terminal");
        await loadTerminal();
        startPoll();
      } catch (err) {
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      }
    });

    (async () => {
      try {
        await loadClient();
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          await ensureProfile(null);
          showApp(true);
          setTab("terminal");
          await loadTerminal();
          startPoll();
        }
      } catch (err) {
        const errEl = document.getElementById("login-err");
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      }
    })();
  </script>
</body>
</html>
