<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Tipster · Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0b0e11;
      --bg-2: #12171c;
      --bg-3: #181e25;
      --line: #273039;
      --line-soft: #1f272f;
      --text: #e8eef4;
      --muted: #8494a6;
      --accent: #3ecf8e;
      --accent-dim: color-mix(in srgb, var(--accent) 18%, transparent);
      --warn: #e6b84a;
      --loss: #e85d5d;
      --focus: #5b9fd4;
      --esports: #5b45c4;
      --row-h: 52px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background:
        radial-gradient(900px 480px at 0% 0%, #152028 0%, transparent 55%),
        linear-gradient(180deg, #090b0d 0%, var(--bg) 35%);
      color: var(--text);
    }
    .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
    [hidden] { display: none !important; }

    /* —— Login —— */
    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .login-box {
      width: min(400px, 100%);
      border: 1px solid var(--line);
      background: var(--bg-2);
      padding: 1.75rem 1.5rem;
    }
    .login-box h1 {
      margin: 0 0 0.2rem;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }
    .login-box h1 span { color: var(--accent); }
    .login-box p { margin: 0 0 1.15rem; color: var(--muted); font-size: 0.9rem; }
    .login-box label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .login-box input {
      width: 100%;
      margin-bottom: 0.8rem;
      padding: 0.6rem 0.7rem;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .login-box input:focus, .btn:focus-visible, .chip:focus-visible, .tabs button:focus-visible {
      outline: 1px solid var(--focus);
      outline-offset: 1px;
    }
    .login-box button[type="submit"] { width: 100%; margin-top: 0.25rem; }
    .btn {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      padding: 0.45rem 0.8rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: var(--accent-dim); }
    .btn-muted { border-color: var(--line); color: var(--muted); }
    .btn-muted:hover { background: var(--bg-3); color: var(--text); }
    .err { color: var(--loss); font-size: 0.85rem; margin-top: 0.55rem; }

    /* —— App bar —— */
    header.app-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem 1rem;
      align-items: center;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg-2) 92%, transparent);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.55rem 1rem;
      min-width: 0;
    }
    header .brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
      white-space: nowrap;
    }
    header .brand span { color: var(--accent); }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.85rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .stats b { color: var(--text); font-weight: 600; }
    .stats .pnl-pos b { color: var(--accent); }
    .stats .pnl-neg b { color: var(--loss); }
    .nav-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      justify-self: end;
    }
    .tabs { display: flex; gap: 0.25rem; }
    .tabs button {
      border: 1px solid transparent;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 0.4rem 0.65rem;
      font: inherit;
      font-size: 0.84rem;
      cursor: pointer;
    }
    .tabs button.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .tabs button:hover { color: var(--text); }

    main { padding: 0.75rem 1rem 4.5rem; max-width: 1400px; margin: 0 auto; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.85rem;
      align-items: center;
      margin-bottom: 0.55rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .toolbar select {
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 0.28rem 0.4rem;
      font: inherit;
    }
    .sport-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.65rem;
      padding: 0.45rem 0.5rem;
      border: 1px solid var(--line);
      background: var(--bg-2);
    }
    .sport-nav[hidden] { display: none; }
    .sport-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted);
      padding: 0.38rem 0.65rem 0.38rem 0.5rem;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      line-height: 1.1;
    }
    .sport-nav-btn .ico {
      width: 1.35rem;
      height: 1.35rem;
      flex: 0 0 auto;
      display: block;
    }
    .sport-nav-btn .ico.svg-draw svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
    .sport-nav-btn .ico img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    .sport-nav-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .sport-nav-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }
    .sport-nav-btn .n {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 700;
    }
    .sport-nav-btn:not(.active) .n { color: var(--muted); }
    .catalog-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }
    .catalog-nav-btn {
      border: 1px solid var(--line);
      background: var(--bg-2);
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .catalog-nav-btn:hover { color: var(--text); border-color: var(--accent); }
    .catalog-nav-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    /* —— Terminal board —— */
    .board {
      border: none;
      background: transparent;
      overflow: visible;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    #events {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      background: transparent;
    }
    .event-card {
      border-bottom: 1px solid var(--line-soft);
      transition: background 0.15s ease;
    }
    .event-card:last-child { border-bottom: 0; }
    .event-card:hover > .row {
      background: color-mix(in srgb, var(--accent) 4%, transparent);
    }
    .event-card.expanded {
      background: color-mix(in srgb, var(--bg-3) 55%, var(--bg-2));
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .event-card.expanded > .row {
      background: transparent;
    }
    .row {
      display: grid;
      grid-template-columns:
        minmax(220px, 1.5fr) minmax(300px, 2.4fr);
      gap: 0.5rem 0.75rem;
      align-items: center;
      padding: 0.5rem 0.7rem;
      min-height: var(--row-h);
    }
    .odds-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 3.9rem;
      gap: 0.45rem;
      align-items: end;
      min-width: 0;
    }
    .odds-group {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 1.35fr);
      gap: 0.35rem;
      min-width: 0;
    }
    .btn-more-mkts {
      flex: 0 0 auto;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.06rem;
      width: 3.9rem;
      min-height: 2.7rem;
      padding: 0.3rem 0.25rem;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--accent) 8%, var(--bg));
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      line-height: 1.05;
      transition: border-color 0.12s ease, background 0.12s ease;
    }
    .btn-more-mkts:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-more-mkts .more-k {
      color: var(--muted);
      font-size: 0.52rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-more-mkts .more-n {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
    }
    .event-card.expanded .btn-more-mkts {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .markets-extra {
      display: none;
      grid-template-columns:
        minmax(220px, 1.5fr) minmax(300px, 2.4fr);
      gap: 0.5rem 0.75rem;
      padding: 0 0.7rem 0.75rem;
      animation: markets-in 0.16s ease;
    }
    .event-card.expanded .markets-extra { display: grid; }
    .markets-extra-body {
      grid-column: 2;
      min-width: 0;
      border: 1px solid var(--line-soft);
      background: color-mix(in srgb, var(--bg) 70%, var(--bg-2));
      padding: 0.55rem 0.6rem 0.6rem;
    }
    .markets-extra-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }
    .markets-extra-head .title {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }
    .markets-extra-head .meta {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      color: var(--accent);
    }
    .markets-extra-head.probe-sb .title { color: #5b9fd4; }
    .markets-extra-head.probe-sb .meta { color: #8ec5f0; }
    .probe-sb-block {
      margin-top: 0.65rem;
      padding-top: 0.55rem;
      border-top: 1px dashed var(--line-soft);
    }
    .chip.probe {
      cursor: default;
      border-color: color-mix(in srgb, #5b9fd4 40%, var(--line));
    }
    .chip.probe .o { color: #8ec5f0; }
    .odds-group.odds-extra {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.45rem;
    }
    .mkt-col.soon .label { color: color-mix(in srgb, var(--muted) 80%, transparent); }
    .mkt-col.soon .chip {
      border-style: dashed;
      opacity: 0.55;
    }
    .markets-soon {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.45rem;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--line-soft);
    }
    @keyframes markets-in {
      from { opacity: 0; transform: translateY(-3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section {
      border: 1px solid var(--line);
      margin-bottom: 0;
      background: var(--bg-2);
      overflow: hidden;
    }
    .section:last-child { margin-bottom: 0; }
    .section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.65rem;
      padding: 0.55rem 0.7rem;
      background: color-mix(in srgb, var(--bg-3) 88%, #000);
      border-bottom: 1px solid var(--line-soft);
      cursor: pointer;
      user-select: none;
    }
    .section-head:hover { background: color-mix(in srgb, var(--accent) 6%, var(--bg-3)); }
    .section.collapsed .section-head { border-bottom: 0; }
    .section-head.esports {
      background: color-mix(in srgb, var(--esports) 28%, #1a1228);
      border-bottom-color: color-mix(in srgb, var(--esports) 45%, var(--line));
    }
    .section-head.esports:hover {
      background: color-mix(in srgb, var(--esports) 38%, #1a1228);
    }
    .section-head.esports .country {
      color: color-mix(in srgb, var(--esports) 75%, #fff);
    }
    .section-head.esports .league {
      color: #d4ccff;
    }
    .section-head.esports .count {
      color: color-mix(in srgb, var(--esports) 70%, var(--muted));
    }
    .section-head.esports .section-toggle {
      border-color: color-mix(in srgb, var(--esports) 55%, var(--line));
      color: #d4ccff;
      background: color-mix(in srgb, var(--esports) 18%, var(--bg));
    }
    .section-toggle {
      flex: 0 0 auto;
      width: 1.35rem;
      height: 1.35rem;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--accent);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .section-head .country {
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: -0.01em;
    }
    .section-head .sport {
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .section-head .league {
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .section-head .count {
      margin-left: auto;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .section-body { display: block; }
    .section.collapsed .section-body { display: none; }
    .section .event-card { border-bottom: 1px solid var(--line-soft); }
    .section .event-card:last-child { border-bottom: 0; }
    .cell-min {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      color: var(--warn);
      font-weight: 600;
      line-height: 1.1;
      white-space: nowrap;
    }
    .cell-score {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1.1;
      white-space: nowrap;
    }
    .match-meta-line {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .match-block {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 0.22rem;
      text-align: left;
    }
    .match-name {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.15;
    }
    .match-name .vs {
      color: var(--muted);
      font-weight: 500;
      margin: 0 0.2rem;
    }
    .team-home { color: #5b9fd4; }
    .team-away { color: #e85d5d; }
    .team-home.esports-team {
      color: #dfff00;
      text-shadow: 0 0 6px rgba(223, 255, 0, 0.55), 0 0 14px rgba(223, 255, 0, 0.35);
    }
    .team-away.esports-team {
      color: #ff2bd6;
      text-shadow: 0 0 6px rgba(255, 43, 214, 0.55), 0 0 14px rgba(255, 43, 214, 0.35);
    }
    .team-nick {
      color: var(--esports);
      font-weight: 600;
    }
    .match-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.45rem;
      align-items: center;
      margin-top: 0.1rem;
      color: var(--muted);
      font-size: 0.72rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.08rem 0.35rem;
      border: 1px solid #000000;
      border-radius: 0;
      background: var(--esports);
      color: #000000;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
      flex: 0 0 auto;
    }
    .match-title-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      max-width: 100%;
      min-width: 0;
    }
    .match-title-row .match-name {
      flex: 1 1 auto;
      min-width: 0;
    }
    .mkt-col {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      min-width: 0;
    }
    .mkt-col .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      line-height: 1;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.22rem;
    }
    .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.02rem;
      min-width: 2.55rem;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--text);
      padding: 0.22rem 0.35rem 0.18rem;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      line-height: 1.05;
    }
    .chip:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .chip:disabled { opacity: 0.35; cursor: not-allowed; }
    .chip .k {
      color: var(--muted);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .chip .o {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.92rem;
    }

    /* —— Tables —— */
    .table-wrap {
      border: 1px solid var(--line);
      background: var(--bg-2);
      overflow: auto;
      max-height: calc(100vh - 150px);
    }
    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    table.data thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--bg-3);
      color: var(--muted);
      font-weight: 500;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 0.55rem;
      text-align: left;
    }
    table.data td {
      border-bottom: 1px solid var(--line-soft);
      padding: 0.5rem 0.55rem;
      vertical-align: top;
    }
    table.data tbody tr:hover td {
      background: color-mix(in srgb, var(--accent) 4%, transparent);
    }
    tr.rank-top td { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    tr.rank-me td { box-shadow: inset 2px 0 0 var(--focus); }
    .pnl-pos { color: var(--accent); }
    .pnl-neg { color: var(--loss); }
    .status-open { color: var(--warn); }
    .status-won { color: var(--accent); }
    .status-lost { color: var(--loss); }
    .status-void { color: var(--muted); }
    .empty {
      color: var(--muted);
      padding: 1.75rem 1rem;
      text-align: center;
      line-height: 1.45;
      font-size: 0.9rem;
    }

    /* —— Toast / slip —— */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 1.1rem;
      transform: translateX(-50%) translateY(calc(100% + 2rem));
      z-index: 50;
      min-width: min(420px, calc(100vw - 1.5rem));
      border: 1px solid var(--accent);
      background: var(--bg-2);
      padding: 0.7rem 0.9rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      transition: transform 0.22s ease, visibility 0.22s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      visibility: hidden;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      visibility: visible;
      pointer-events: auto;
    }
    .toast .msg { font-size: 0.86rem; }
    .toast .msg strong { color: var(--accent); font-family: "IBM Plex Mono", monospace; }
    .toast.error { border-color: var(--loss); }
    .toast.error .msg strong { color: var(--loss); }

    @media (max-width: 960px) {
      .row, .odds-main, .odds-group, .markets-extra {
        grid-template-columns: 1fr;
      }
      .row {
        gap: 0.4rem;
        padding: 0.7rem;
      }
      .match-name { white-space: normal; }
      .cell-min {
        display: inline-block;
        margin-right: 0.55rem;
      }
      .odds-main { gap: 0.45rem; align-items: stretch; }
      .odds-group { gap: 0.55rem; }
      .btn-more-mkts {
        width: 100%;
        flex-direction: row;
        gap: 0.45rem;
        min-height: 2.2rem;
      }
      .markets-extra {
        padding: 0 0.7rem 0.75rem;
      }
      .markets-extra-body {
        grid-column: 1;
      }
      .odds-group.odds-extra,
      .markets-soon {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 520px) {
      .odds-group.odds-extra,
      .markets-soon {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      header.app-bar {
        grid-template-columns: 1fr;
      }
      .nav-row { justify-self: stretch; justify-content: space-between; }
      main { padding: 0.65rem 0.65rem 4.5rem; }
    }
  </style>
</head>
<body>
  <div id="login" class="login-screen">
    <form class="login-box" id="login-form">
      <h1>Arena <span>Tipster</span></h1>
      <p>Terminal de paper trading · stake fixo 1 unidade</p>
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <label for="display-name">Apelido no ranking</label>
      <input id="display-name" type="text" maxlength="40" placeholder="Opcional" />
      <button class="btn" type="submit">Entrar no terminal</button>
      <div id="login-err" class="err" hidden></div>
    </form>
  </div>

  <div id="app" hidden>
    <header class="app-bar">
      <div class="brand-row">
        <h1 class="brand">Arena <span>Tipster</span></h1>
        <div class="stats" id="header-stats">
          <span id="stat-name">—</span>
          <span id="stat-pnl" class="">PnL dia <b>—</b></span>
          <span id="stat-open">Open <b>0</b></span>
          <span id="stat-feed">Feed <b>—</b></span>
        </div>
      </div>
      <div class="nav-row">
        <nav class="tabs" aria-label="Abas">
          <button type="button" data-tab="terminal" class="active">Terminal</button>
          <button type="button" data-tab="picks">Meus picks</button>
          <button type="button" data-tab="ranking">Ranking</button>
        </nav>
        <button type="button" class="btn btn-muted" id="btn-logout">Sair</button>
      </div>
    </header>

    <main>
      <section id="panel-terminal">
        <nav class="catalog-nav" aria-label="Catálogo">
          <button type="button" class="catalog-nav-btn active" data-catalog="live">Ao vivo</button>
          <button type="button" class="catalog-nav-btn" data-catalog="scheduled">Pré-jogos</button>
        </nav>
        <nav class="sport-nav" id="sport-nav" aria-label="Esportes ao vivo" hidden></nav>
        <div class="board" id="board">
          <div id="events"></div>
        </div>
      </section>

      <section id="panel-picks" hidden>
        <div class="toolbar"><span>Histórico · stake 1u · PnL sempre na odd snapshot</span></div>
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th>Quando</th>
                <th>Jogo</th>
                <th>Mercado</th>
                <th>Odd</th>
                <th>Status</th>
                <th>PnL</th>
              </tr>
            </thead>
            <tbody id="picks-body"></tbody>
          </table>
        </div>
      </section>

      <section id="panel-ranking" hidden>
        <div class="toolbar">
          <label>
            Período
            <select id="rank-period">
              <option value="all">Todo o concurso</option>
              <option value="7">Últimos 7 dias</option>
              <option value="30">Últimos 30 dias</option>
            </select>
          </label>
        </div>
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th>#</th>
                <th>Tipster</th>
                <th>PnL (u)</th>
                <th>Winrate</th>
                <th>Settled</th>
                <th>Open</th>
              </tr>
            </thead>
            <tbody id="rank-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <div class="msg" id="toast-msg"></div>
    <button type="button" class="btn btn-muted" id="toast-close">Ok</button>
  </div>

  <script>
    const SEL_LABEL = {
      home: "1", draw: "X", away: "2",
      over: "Mais", under: "Menos",
      yes: "Sim", no: "Não",
      "1x": "1X", x2: "X2", "12": "12",
    };
    const MKT_LABEL = {
      "1x2": "1X2",
      total: "Total",
      btts: "Ambas",
      double_chance: "Dupla",
    };
    const MKT_COMPACT = ["1x2", "total"];
    const MKT_EXTRA = ["btts", "double_chance"];
    const TOTAL_COMPACT_LINES = 2;
    const SPORT_LABEL = {
      football: "Futebol",
      basketball: "Basquete",
      tennis: "Tênis",
      tennis_sb: "Tênis 2",
      volleyball: "Vôlei",
      hockey: "Hockey",
      handball: "Handebol",
      baseball: "Baseball",
      american_football: "Futebol americano",
      rugby: "Rugby",
      table_tennis: "Tênis de mesa",
      badminton: "Badminton",
      darts: "Darts",
      snooker: "Snooker",
      boxing: "Boxe",
      mma: "MMA",
      futsal: "Futsal",
      other: "Outros",
    };
    const SPORT_ALIASES = {
      tabl: "table_tennis",
      badm: "badminton",
      foot: "football",
      bask: "basketball",
      tenn: "tennis",
      voll: "volleyball",
      iceh: "hockey",
    };
    const SPORT_ORDER = [
      "football", "basketball", "tennis", "tennis_sb", "volleyball", "hockey",
      "handball", "futsal", "table_tennis", "badminton",
      "baseball", "american_football", "rugby",
      "darts", "snooker", "boxing", "mma", "other",
    ];

    let sb = null;
    let tipster = null;
    let pollTimer = null;
    let toastTimer = null;
    const expandedEventIds = new Set();
    const detailFetchedIds = new Set();
    const detailLoadingIds = new Set();
    const detailErrorById = new Map();
    const superbetByEventId = new Map();
    const superbetLoadingIds = new Set();
    let selectedSport = null;
    let catalogMode = "live"; // live | scheduled
    let terminalCache = { events: [], mktsByEvent: new Map() };
    let superbetTennisCache = {
      events: [],
      mktsByEvent: new Map(),
      loading: false,
      error: null,
      fetchedAt: 0,
    };
    const SUPERBET_TENNIS_TTL_MS = 45_000;

    function fmtOdd(n) {
      const x = Number(n);
      return Number.isFinite(x) ? x.toFixed(2) : "—";
    }
    function fmtPnl(n) {
      if (n == null || n === "") return "—";
      const x = Number(n);
      if (!Number.isFinite(x)) return "—";
      return (x >= 0 ? "+" : "") + x.toFixed(2);
    }
    function fmtWhen(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("pt-BR", { hour12: false });
    }
    function fmtTimeShort(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleTimeString("pt-BR", { hour12: false });
    }
    function isEsportsSport(sport) {
      const s = String(sport || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      return s === "esps" || s === "esport" || s === "esports" || s.includes("esport");
    }
    function isEsports(home, away, league) {
      const t = `${home || ""} ${away || ""} ${league || ""}`.toLowerCase();
      if (t.includes("esports") || t.includes("e-sports") || t.includes("e sports")) return true;
      if (t.includes("minutos de jogo") || t.includes("nba 2k")) return true;
      if (t.includes("eadriatic") || t.includes("h2h gg") || t.includes("gt leagues")) return true;
      if (t.includes("king growth")) return true;
      if (/\bgaming\b/.test(t) || /\bbattle\b/.test(t)) return true;
      return false;
    }
    function isVirtualCatalog(home, away, league, country) {
      const t = `${home || ""} ${away || ""} ${league || ""} ${country || ""}`.toLowerCase();
      return (
        t.includes("virtual") ||
        t.includes("virtuais") ||
        t.includes("simulado") ||
        t.includes("vrts")
      );
    }
    /** Exclude virtual + Esports / short-format sims from the Terminal. */
    function isExcludedLiveEvent(ev) {
      if (
        isEsportsSport(ev.sport) ||
        isEsports(ev.home, ev.away, ev.league) ||
        isEsports(ev.home, ev.away, ev.country) ||
        isVirtualCatalog(ev.home, ev.away, ev.league, ev.country)
      ) {
        return true;
      }
      return isLowPriorityCompetition(ev.league, ev.country, ev.sport);
    }

    function isLowPriorityCompetition(league, country, sport) {
      const norm = (s) => String(s || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
      const blob = `${norm(league)} ${norm(country)} ${norm(sport)}`;
      if (!blob.trim()) return false;
      const keep = [
        /\bserie\s*a\b/, /\bserie\s*b\b/, /\bbrasileirao\b/, /\bpremier\s*league\b/,
        /\bla\s*liga\b/, /\bbundesliga\b/, /\bligue\s*1\b/, /\bchampions\s*league\b/,
        /\beuropa\s*league\b/, /\bcopa\s*libertadores\b/, /\bnba\b/, /\batp\b/, /\bwta\b/,
      ];
      if (keep.some((re) => re.test(blob))) return false;
      const drop = [
        /\bserie\s*c\b/, /\bserie\s*d\b/, /\b3a\s*divis/, /\bterceira\s*divis/,
        /\b4a\s*divis/, /\bu-?\s*1[5-9]\b/, /\bu-?\s*2[01]\b/, /\bsub-?\s*1[5-9]\b/,
        /\bjuvenil\b/, /\byouth\b/, /\bamistoso/, /\bfriendly\b/, /\bamador\b/,
        /\bamateur\b/, /\breservas?\b/, /\breserves?\b/, /\bliga\s*regional\b/,
        /\bcampeonato\s*regional\b/, /\bsegunda\s*b\b/,
      ];
      if (drop.some((re) => re.test(blob))) return true;
      const sp = norm(sport);
      const lg = norm(league);
      if ((sp === "football" || sp === "soccer" || !sp) && /^(masculino|feminino|women|men)$/.test(lg)) {
        return true;
      }
      return false;
    }
    function stripEsportsLabel(name) {
      return String(name || "")
        .replace(/\s*\(\s*e-?sports\s*\)\s*/gi, " ")
        .replace(/\s{2,}/g, " ")
        .trim();
    }
    function formatTeamHtml(name, teamClass) {
      const cleaned = stripEsportsLabel(name);
      const m = cleaned.match(/^(.*)\s*\(([^()]+)\)\s*$/);
      if (m && m[1].trim()) {
        const team = m[1].trim();
        const nick = m[2].trim();
        return `<span class="${teamClass}">${escapeHtml(team)} <span class="team-nick">[${escapeHtml(nick)}]</span></span>`;
      }
      return `<span class="${teamClass}">${escapeHtml(cleaned)}</span>`;
    }
    function startOfLocalDayIso() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d.toISOString();
    }

    function showToast(messageHtml, { error = false } = {}) {
      const el = document.getElementById("toast");
      document.getElementById("toast-msg").innerHTML = messageHtml;
      el.classList.toggle("error", !!error);
      el.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 4200);
    }

    async function loadClient() {
      const cfgRes = await fetch("./supabase.config.json");
      if (!cfgRes.ok) throw new Error("web/supabase.config.json não encontrado");
      const cfg = await cfgRes.json();
      if (!cfg.url || !cfg.anonKey) throw new Error("Configure url e anonKey");
      sb = window.supabase.createClient(cfg.url, cfg.anonKey, {
        auth: { persistSession: true, autoRefreshToken: true },
      });
    }

    async function ensureProfile(displayName) {
      const { data, error } = await sb.rpc("ensure_tipster", {
        p_display_name: displayName || null,
      });
      if (error) throw error;
      tipster = Array.isArray(data) ? data[0] : data;
      document.getElementById("stat-name").textContent = tipster.display_name;
      await refreshHeaderStats();
    }

    async function refreshHeaderStats() {
      if (!tipster) return;
      const since = startOfLocalDayIso();
      const { data: picks } = await sb
        .from("picks")
        .select("status,pnl_u,placed_at")
        .eq("tipster_id", tipster.id)
        .gte("placed_at", since);

      let openN = 0;
      let pnl = 0;
      for (const p of picks || []) {
        if (p.status === "open") openN += 1;
        if (p.status === "won" || p.status === "lost" || p.status === "void") {
          pnl += Number(p.pnl_u || 0);
        }
      }
      const pnlEl = document.getElementById("stat-pnl");
      pnlEl.className = pnl >= 0 ? "pnl-pos" : "pnl-neg";
      pnlEl.innerHTML = `PnL dia <b>${fmtPnl(pnl)}</b>`;
      document.getElementById("stat-open").innerHTML = `Open <b>${openN}</b>`;
    }

    function showApp(on) {
      document.getElementById("login").hidden = on;
      document.getElementById("app").hidden = !on;
    }

    function setTab(name) {
      document.querySelectorAll(".tabs button").forEach((b) => {
        b.classList.toggle("active", b.dataset.tab === name);
      });
      document.getElementById("panel-terminal").hidden = name !== "terminal";
      document.getElementById("panel-picks").hidden = name !== "picks";
      document.getElementById("panel-ranking").hidden = name !== "ranking";
      if (name === "picks") loadPicks();
      if (name === "ranking") loadRanking();
      if (name === "terminal") loadTerminal();
    }

    async function placePick(eventId, marketKey, selectionKey, line, labelHint) {
      const { data, error } = await sb.rpc("place_pick", {
        p_event_id: eventId,
        p_market_key: marketKey,
        p_selection_key: selectionKey,
        p_line: line,
        p_contest_slug: "arena-open",
      });
      if (error) {
        showToast(`<strong>Falha</strong> · ${error.message}`, { error: true });
        return;
      }
      const pick = Array.isArray(data) ? data[0] : data;
      const label = labelHint || `${MKT_LABEL[marketKey] || marketKey} ${SEL_LABEL[selectionKey] || selectionKey}`;
      showToast(`Pick <strong>${label}</strong> @ <strong>${fmtOdd(pick.odd_snapshot)}</strong> · 1u`);
      refreshHeaderStats();
      if (!document.getElementById("panel-picks").hidden) loadPicks();
    }

    function findSelection(mkt, key) {
      return (mkt?.selections || []).find((s) => s.selection_key === key) || null;
    }

    function chipHtml(evId, m, sel, label, opts = {}) {
      if (opts.readonly) return chipHtmlProbe(m, sel, label);
      if (!m || !sel) {
        return `<button type="button" class="chip" disabled><span class="k">${label}</span><span class="o">—</span></button>`;
      }
      const disabled = m.status !== "open" || sel.status !== "open";
      return `<button type="button" class="chip" ${disabled ? "disabled" : ""}
        data-event="${evId}" data-mkt="${m.market_key}" data-sel="${sel.selection_key}"
        data-line="${m.line == null ? "" : m.line}" data-label="${label}">
        <span class="k">${label}</span>
        <span class="o">${fmtOdd(sel.odd)}</span>
      </button>`;
    }

    function isTennisSbSport(sport) {
      return normalizeSportKey(sport) === "tennis_sb";
    }

    function groupMarketsByKey(markets) {
      const byKey = new Map();
      for (const m of markets || []) {
        if (!byKey.has(m.market_key)) byKey.set(m.market_key, []);
        byKey.get(m.market_key).push(m);
      }
      return byKey;
    }

    function sortedTotals(items) {
      return [...(items || [])].sort((a, b) => (a.line ?? 99) - (b.line ?? 99));
    }

    function pickCompactTotals(items, homeScore, awayScore) {
      const all = sortedTotals(items);
      if (all.length <= TOTAL_COMPACT_LINES) return all;
      const need = (Number(homeScore) || 0) + (Number(awayScore) || 0) + 0.5;
      return [...all]
        .sort((a, b) => Math.abs((a.line ?? 99) - need) - Math.abs((b.line ?? 99) - need))
        .slice(0, TOTAL_COMPACT_LINES)
        .sort((a, b) => (a.line ?? 99) - (b.line ?? 99));
    }

    function totalChipsHtml(evId, items, opts = {}) {
      const chips = (items || []).map((m) => {
        const lineLabel = m.line != null ? String(m.line).replace(".", ",") : "";
        return ["over", "under"].map((k) => {
          const prefix = k === "over" ? "+" : "−";
          return chipHtml(evId, m, findSelection(m, k), `${prefix}${lineLabel}`, opts);
        }).join("");
      }).join("");
      return chips || chipHtml(evId, null, null, "—", opts);
    }

    function renderMktCol(evId, key, items, { totalsSlice = null, label = null, readonly = false } = {}) {
      let chips = "";
      if (key === "1x2") {
        const m = items[0];
        chips = ["home", "draw", "away"].map((k) =>
          chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k], { readonly })
        ).join("");
      } else if (key === "btts") {
        const m = items[0];
        chips = ["yes", "no"].map((k) =>
          chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k], { readonly })
        ).join("");
      } else if (key === "double_chance") {
        const m = items[0];
        chips = ["1x", "x2", "12"].map((k) =>
          chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k], { readonly })
        ).join("");
      } else if (key === "total") {
        const sorted = sortedTotals(items);
        const use = totalsSlice ? totalsSlice(sorted) : sorted;
        chips = totalChipsHtml(evId, use, { readonly });
      }
      if (!chips && key !== "total") {
        chips = chipHtml(evId, null, null, "—", { readonly });
      }
      return `<div class="mkt-col">
        <div class="label">${label || MKT_LABEL[key] || key}</div>
        <div class="chips">${chips}</div>
      </div>`;
    }

    function soonCol(label, keys) {
      const chips = keys.map((k) =>
        `<button type="button" class="chip" disabled><span class="k">${k}</span><span class="o">—</span></button>`
      ).join("");
      return `<div class="mkt-col soon">
        <div class="label">${label}</div>
        <div class="chips">${chips}</div>
      </div>`;
    }

    function extrasForSport(sport) {
      const key = normalizeSportKey(sport);
      if (key === "football" || key === "futsal") return ["btts", "double_chance"];
      return [];
    }

    function countExtraMarkets(byKey, homeScore, awayScore, sport) {
      let n = 0;
      for (const key of extrasForSport(sport)) {
        if ((byKey.get(key) || []).length) n += 1;
      }
      const compact = pickCompactTotals(byKey.get("total") || [], homeScore, awayScore);
      const compactLines = new Set(compact.map((m) => m.line));
      n += sortedTotals(byKey.get("total") || []).filter((m) => !compactLines.has(m.line)).length;
      return n;
    }

    function renderCompactMarkets(evId, byKey, homeScore, awayScore, sport) {
      const readonly = isTennisSbSport(sport);
      return MKT_COMPACT.map((key) => {
        if (key === "1x2") {
          const m = (byKey.get(key) || [])[0];
          const sportKey = normalizeSportKey(sport);
          const sides = (sportKey === "football" || sportKey === "futsal")
            ? ["home", "draw", "away"]
            : ["home", "away"];
          const chips = sides.map((k) =>
            chipHtml(evId, m, findSelection(m, k), SEL_LABEL[k], { readonly })
          ).join("");
          return `<div class="mkt-col">
            <div class="label">${MKT_LABEL[key] || key}</div>
            <div class="chips">${chips}</div>
          </div>`;
        }
        if (key === "total") {
          const picked = pickCompactTotals(byKey.get(key) || [], homeScore, awayScore);
          return renderMktCol(evId, key, picked, { readonly });
        }
        return renderMktCol(evId, key, byKey.get(key) || [], { readonly });
      }).join("");
    }

    function renderExtraMarkets(evId, byKey, homeScore, awayScore, sport) {
      const readonly = isTennisSbSport(sport);
      const cols = [];
      for (const key of extrasForSport(sport)) {
        const items = byKey.get(key) || [];
        if (!items.length) continue;
        cols.push(renderMktCol(evId, key, items, { readonly }));
      }
      const compact = pickCompactTotals(byKey.get("total") || [], homeScore, awayScore);
      const compactLines = new Set(compact.map((m) => m.line));
      const extraTotals = sortedTotals(byKey.get("total") || []).filter((m) => !compactLines.has(m.line));
      if (extraTotals.length) {
        cols.push(renderMktCol(evId, "total", extraTotals, { label: "Total + linhas", readonly }));
      }
      return cols.join("");
    }

    function chipHtmlProbe(m, sel, label) {
      if (!m || !sel) {
        return `<button type="button" class="chip probe" disabled><span class="k">${label}</span><span class="o">—</span></button>`;
      }
      return `<button type="button" class="chip probe" disabled title="Probe SuperBet (somente comparação)">
        <span class="k">${label}</span>
        <span class="o">${fmtOdd(sel.odd)}</span>
      </button>`;
    }

    function renderProbeMarkets(markets) {
      const byKey = groupMarketsByKey(markets || []);
      const cols = [];
      const ml = byKey.get("1x2") || [];
      if (ml.length) {
        const m = ml[0];
        const chips = ["home", "away"].map((k) =>
          chipHtmlProbe(m, findSelection(m, k), SEL_LABEL[k])
        ).join("");
        cols.push(`<div class="mkt-col"><div class="label">1X2</div><div class="chips">${chips}</div></div>`);
      }
      const totals = sortedTotals(byKey.get("total") || []).slice(0, 4);
      if (totals.length) {
        const chips = totals.map((m) => {
          const lineLabel = m.line != null ? String(m.line).replace(".", ",") : "";
          return ["over", "under"].map((k) => {
            const prefix = k === "over" ? "+" : "−";
            return chipHtmlProbe(m, findSelection(m, k), `${prefix}${lineLabel}`);
          }).join("");
        }).join("");
        cols.push(`<div class="mkt-col"><div class="label">Total</div><div class="chips">${chips}</div></div>`);
      }

    function normalizeSportKey(sport) {
      const raw = String(sport || "other").trim().toLowerCase();
      return SPORT_ALIASES[raw] || raw || "other";
    }

    function sportIconSvg(sport) {
      const key = normalizeSportKey(sport);
      const fileKey = key === "futsal" ? "football" : (key === "tennis_sb" ? "tennis" : key);
      const known = [
        "football", "basketball", "tennis", "volleyball", "hockey", "handball",
        "baseball", "american_football", "rugby", "table_tennis", "badminton",
        "darts", "snooker", "boxing", "mma", "other",
      ];
      const file = known.includes(fileKey) ? fileKey : "other";
      return `<span class="ico" aria-hidden="true"><img src="./assets/sports/${file}.svg" alt="" width="22" height="22" decoding="async" /></span>`;
    }

    function sportLabelOf(sport) {
      const key = normalizeSportKey(sport);
      return SPORT_LABEL[key] || key.replace(/_/g, " ");
    }

    function listSportsWithCounts(events) {
      const counts = new Map();
      for (const ev of events) {
        const key = normalizeSportKey(ev.sport);
        if (key === "tennis_sb") continue;
        counts.set(key, (counts.get(key) || 0) + 1);
      }
      const keys = [...counts.keys()].sort((a, b) => {
        const ia = SPORT_ORDER.indexOf(a);
        const ib = SPORT_ORDER.indexOf(b);
        const oa = ia === -1 ? 999 : ia;
        const ob = ib === -1 ? 999 : ib;
        if (oa !== ob) return oa - ob;
        return sportLabelOf(a).localeCompare(sportLabelOf(b), "pt-BR");
      });
      const sports = keys.map((key) => ({ key, label: sportLabelOf(key), count: counts.get(key) }));
      if (catalogMode === "live") {
        const sbCount = superbetTennisCache.events.length;
        const sbItem = {
          key: "tennis_sb",
          label: sportLabelOf("tennis_sb"),
          count: sbCount || (superbetTennisCache.loading ? "…" : 0),
        };
        const ti = sports.findIndex((s) => s.key === "tennis");
        if (ti >= 0) sports.splice(ti + 1, 0, sbItem);
        else sports.push(sbItem);
      }
      return sports;
    }

      // #endregion

    function findCachedEvent(eventId) {
      return (terminalCache.events || []).find((e) => e.id === eventId)

        || null;

    root.querySelectorAll(".btn-more-mkts").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const card = btn.closest(".event-card");
          if (!card) return;
          const id = card.dataset.eventId;
          const willOpen = !card.classList.contains("expanded");

          const applyCollapsedLabel = (button) => {
            button.setAttribute("aria-expanded", "false");
            button.setAttribute("aria-label", "Mais mercados");
            const k = button.querySelector(".more-k");
            const n = button.querySelector(".more-n");
            const count = Number(button.dataset.extraCount || 0);
            if (k) k.textContent = "Mais";
            if (n) n.textContent = count > 0 ? `+${count}` : "+";
          };

          if (willOpen) {
            root.querySelectorAll(".event-card.expanded").forEach((other) => {
              if (other === card) return;
              other.classList.remove("expanded");
              const otherId = other.dataset.eventId;
              if (otherId) expandedEventIds.delete(otherId);
              const otherBtn = other.querySelector(".btn-more-mkts");
              if (otherBtn) applyCollapsedLabel(otherBtn);
            });
            card.classList.add("expanded");
            if (id) expandedEventIds.add(id);
            btn.setAttribute("aria-expanded", "true");
            btn.setAttribute("aria-label", "Recolher mercados");
            const k = btn.querySelector(".more-k");
            const n = btn.querySelector(".more-n");
            if (k) k.textContent = "Menos";
            if (n) n.textContent = "−";

            const ev = findCachedEvent(id);
            if (ev && isTennisSbSport(ev.sport)) {
              detailFetchedIds.add(id);
              renderTerminalBoard();
              return;
            }

            if (id && !detailLoadingIds.has(id)) {
              const metaEl = card.querySelector(".markets-extra-head .meta");
              const firstLoad = !detailFetchedIds.has(id);
              if (firstLoad && metaEl) metaEl.textContent = "Carregando mercados…";
              detailLoadingIds.add(id);
              const tasks = [fetchEventDetailMarkets(ev)];
              if (ev && !superbetByEventId.has(id) && !superbetLoadingIds.has(id)) {
                superbetLoadingIds.add(id);
                tasks.push(
                  fetchSuperbetProbe(ev)
                    .then((data) => {
                      superbetByEventId.set(id, data);
                    })
                    .catch((err) => {
                      superbetByEventId.set(id, { error: err?.message || String(err) });
                    })
                    .finally(() => {
                      superbetLoadingIds.delete(id);
                    }),
                );
              }
              Promise.allSettled(tasks)
                .then((results) => {
                  detailLoadingIds.delete(id);
                  const detailResult = results[0];
                  if (detailResult && detailResult.status === "rejected") {
                    const err = detailResult.reason;
                    detailErrorById.set(id, err?.message || String(err));
                    if (firstLoad) {
                      showToast(`<strong>Mercados</strong> · ${err?.message || err}`, { error: true });
                    }
                  }
                  renderTerminalBoard();
                });
            }
          } else {
            card.classList.remove("expanded");
            if (id) expandedEventIds.delete(id);
            applyCollapsedLabel(btn);
          }
        });
      });
    }

          feedStat.innerHTML = `Pré <b>—</b>`;

          .from("tipster_live_meta")
          .select("fetched_at,live_total,last_error")
          .eq("id", 1)
          .maybeSingle();

          feedStat.innerHTML = `Feed <b>${fmtTimeShort(meta.fetched_at)}</b>`;

        .from("live_events")
        .select("id,sport,home,away,league,country,league_id,minute,home_score,away_score,starts_at,status,updated_at,provider_event_id")
        .eq("status", statusFilter)
        .order(catalogMode === "scheduled" ? "starts_at" : "minute", {

      if (error) {

      if (!events?.length) {

        sportNav.hidden = true;
        root.innerHTML = `<div class="empty">Nenhum pré-jogo no catálogo agora.</div>`;
        return;
      }

      const realEvents = events.filter((ev) => !isExcludedLiveEvent(ev));
      if (!realEvents.length) {
        terminalCache = { events: [], mktsByEvent: new Map() };
        if (catalogMode === "live") {
          const sports = listSportsWithCounts([]);
          renderSportNav(sports);
          if (selectedSport === "tennis_sb") {
            await loadSuperbetTennis();
            return;
          }
          root.innerHTML = `<div class="empty">Nenhum jogo relevante no catálogo agora.<br>
            Virtuais, Esports e ligas classe C ficam de fora. Use <strong>Tênis 2</strong> para SuperBet.</div>`;
          return;
        }
        sportNav.hidden = true;
        root.innerHTML = `<div class="empty">Nenhum jogo relevante no catálogo agora.<br>
          Virtuais, Esports e ligas classe C ficam de fora.</div>`;
        return;
      }

      const ids = realEvents.map((e) => e.id);
      const { data: markets } = await sb
        .from("live_markets")
        .select("id,event_id,market_key,line,status")
        .in("event_id", ids);

      const mktIds = (markets || []).map((m) => m.id);
      const { data: selections } = mktIds.length
        ? await sb
          .from("live_selections")
          .select("market_id,selection_key,odd,status")
          .in("market_id", mktIds)
        : { data: [] };

      const selsByMkt = new Map();
      for (const s of selections || []) {
        if (!selsByMkt.has(s.market_id)) selsByMkt.set(s.market_id, []);
        selsByMkt.get(s.market_id).push(s);
      }
      const mktsByEvent = new Map();
      for (const m of markets || []) {
        const full = { ...m, selections: selsByMkt.get(m.id) || [] };
        if (!mktsByEvent.has(m.event_id)) mktsByEvent.set(m.event_id, []);
        mktsByEvent.get(m.event_id).push(full);
      }

      terminalCache = { events: realEvents, mktsByEvent };
      const sports = listSportsWithCounts(realEvents);
      renderSportNav(sports);
      if (selectedSport === "tennis_sb") {
        await loadSuperbetTennis();
      } else {
        renderTerminalBoard();
      }
      refreshHeaderStats();
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /** Esports league bars: drop "minutos de jogo", put count after 2x4 as "(N jogos)". */
    function formatSectionLeague(league, count, esports) {
      let label = String(league || "").trim();
      if (!esports) return { label, showCount: true };

      label = label
        .replace(/\s*minutos\s+de\s+jogo\s*/gi, " ")
        .replace(/\s+/g, " ")
        .replace(/\s*-\s*$/, "")
        .trim();

      const n = Number(count) || 0;
      const countText = `(${n} ${n === 1 ? "jogo" : "jogos"})`;
      if (/\d+\s*[xX]\s*\d+/.test(label)) {
        label = label.replace(/(\d+\s*[xX]\s*\d+)/, `$1 ${countText}`);
      } else {
        label = `${label} ${countText}`.trim();
      }
      return { label, showCount: false };
    }

    function groupEventsByCountryLeague(events) {
      const map = new Map();
      for (const ev of events) {
        const sport = normalizeSportKey(ev.sport);
        const country = (ev.country && String(ev.country).trim()) || "Outros";
        const league = (ev.league && String(ev.league).trim()) || "Sem liga";
        const key = `${sport}|${country.toLowerCase()}|${league.toLowerCase()}`;
        if (!map.has(key)) {
          map.set(key, { key, sport, country, league, events: [] });
        }
        map.get(key).events.push(ev);
      }

      const groups = [...map.values()];
      groups.sort((a, b) => {
        const c = a.country.localeCompare(b.country, "pt-BR");
        if (c !== 0) return c;
        return a.league.localeCompare(b.league, "pt-BR");
      });
      for (const g of groups) {
        g.events.sort((x, y) => {
          if (x.starts_at || y.starts_at) {
            const sx = x.starts_at ? new Date(x.starts_at).getTime() : 0;
            const sy = y.starts_at ? new Date(y.starts_at).getTime() : 0;
            return sx - sy;
          }
          const mx = x.minute == null ? 999 : Number(x.minute);
          const my = y.minute == null ? 999 : Number(y.minute);
          return mx - my;
        });
      }
      return groups;
    }

    function renderEventRow(ev, markets) {
      const meta = ev.meta || {};
      const score = catalogMode === "scheduled"
        ? "vs"
        : `${ev.home_score ?? 0} x ${ev.away_score ?? 0}`;
      let min = catalogMode === "scheduled"
        ? (ev.starts_at
          ? new Date(ev.starts_at).toLocaleString("pt-BR", {
            day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false,
          })
          : "—")
        : (ev.minute != null ? `${ev.minute}'` : "—");
      if (isTennisSbSport(ev.sport)) {
        const bits = [meta.match_status, meta.game_score].filter(Boolean);
        min = bits.length ? bits.join(" · ") : "Ao vivo";
      }
      const byKey = groupMarketsByKey(markets);
      // #region agent log
      if (isTennisSbSport(ev.sport) || expandedEventIds.has(ev.id) || /ferguson|mochizuki/i.test(`${ev.home} ${ev.away}`)) {
        fetch('http://127.0.0.1:7904/ingest/86615625-6ae5-4e98-a1da-0a5f0f15fc42',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'6e4f91'},body:JSON.stringify({sessionId:'6e4f91',runId:'tennis2',hypothesisId:'H3',location:'tipster.html:renderEventRow',message:'render row',data:{sport:ev.sport,sportNorm:normalizeSportKey(ev.sport),home:ev.home,away:ev.away,score,min,marketKeys:[...byKey.keys()],totalLines:(byKey.get('total')||[]).map(m=>m.line),mlSels:((byKey.get('1x2')||[])[0]?.selections||[]).map(s=>({k:s.selection_key,o:s.odd})),expanded:expandedEventIds.has(ev.id)},timestamp:Date.now()})}).catch(()=>{});
      }
      // #endregion
      const compact = renderCompactMarkets(ev.id, byKey, ev.home_score, ev.away_score, ev.sport);
      const extra = renderExtraMarkets(ev.id, byKey, ev.home_score, ev.away_score, ev.sport);
      const extraCount = countExtraMarkets(byKey, ev.home_score, ev.away_score, ev.sport);
      const moreLabel = extraCount > 0 ? `+${extraCount}` : "+";
      const isOpen = expandedEventIds.has(ev.id);
      const home = stripEsportsLabel(ev.home);
      const away = stripEsportsLabel(ev.away);
      const extraMeta = isTennisSbSport(ev.sport)
        ? (() => {
          const shown = meta.shown_odds ?? (Array.isArray(ev.offer_groups)
            ? ev.offer_groups.reduce((n, g) => n + (g.selections || []).length, 0)
            : 0);
          const groups = meta.shown_groups ?? (ev.offer_groups || []).length;
          const raw = meta.odds_count != null ? meta.odds_count : "?";
          return `${shown} odds · ${groups} mercados (de ${raw} no JSON)`;
        })()
        : detailLoadingIds.has(ev.id)
        ? "Carregando mercados…"
        : detailErrorById.has(ev.id)
          ? "Falha ao carregar"
        : extraCount === 1
          ? "1 disponível"
          : extraCount > 1
            ? `${extraCount} disponíveis`
            : (detailFetchedIds.has(ev.id) ? "Sem extras neste jogo" : "Toque + para carregar");
      const tennisSbBody = isTennisSbSport(ev.sport)
        ? `<div class="odds-group odds-extra">${renderSuperbetOfferGroups(ev)}</div>`
        : `${extra ? `<div class="odds-group odds-extra">${extra}</div>` : ""}
            ${renderSuperbetCompareBlock(ev)}
            <div class="markets-soon">${renderSoonMarkets(ev.sport)}</div>`;
      return `<article class="event-card${isOpen ? " expanded" : ""}" data-event-id="${escapeHtml(ev.id)}" data-provider-event-id="${escapeHtml(ev.provider_event_id || "")}">
        <div class="row">
          <div class="match-block">
            <div class="match-title-row">
              <div class="match-name" title="${escapeHtml(home)} × ${escapeHtml(away)}">${formatTeamHtml(ev.home, "team-home")}<span class="vs"> × </span>${formatTeamHtml(ev.away, "team-away")}</div>
            </div>
            <div class="match-meta-line">
              <span class="cell-min">${escapeHtml(min)}</span>
              <span class="cell-score">${score}</span>
            </div>
          </div>
          <div class="odds-main">
            <div class="odds-group">${compact}</div>
            <button type="button" class="btn-more-mkts" data-extra-count="${isTennisSbSport(ev.sport) ? (ev.offer_groups || []).length || extraCount : extraCount}" aria-expanded="${isOpen ? "true" : "false"}" aria-label="${isOpen ? "Recolher mercados" : "Mais mercados"}">
              <span class="more-k">${isOpen ? "Menos" : "Mais"}</span>
              <span class="more-n">${isOpen ? "−" : (isTennisSbSport(ev.sport) && (ev.offer_groups || []).length ? `+${(ev.offer_groups || []).length}` : moreLabel)}</span>
            </button>
          </div>
        </div>
        <div class="markets-extra">
          <div class="markets-extra-body">
            <div class="markets-extra-head">
              <span class="title">${isTennisSbSport(ev.sport) ? "Mercados SuperBet" : "Outros mercados"}</span>
              <span class="meta">${extraMeta}</span>
            </div>
            ${tennisSbBody}
          </div>
        </div>
      </article>`;
    }

    async function loadPicks() {
      if (!tipster) return;
      const { data, error } = await sb
        .from("picks")
        .select("id,placed_at,market_key,selection_key,line,odd_snapshot,status,pnl_u,event_id,live_events(home,away)")
        .eq("tipster_id", tipster.id)
        .order("placed_at", { ascending: false })
        .limit(100);

      const body = document.getElementById("picks-body");
      if (error) {
        body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
        return;
      }
      if (!data?.length) {
        body.innerHTML = `<tr><td colspan="6" class="empty">Nenhum pick ainda — clique uma odd no Terminal.</td></tr>`;
        return;
      }
      body.innerHTML = data.map((p) => {
        const game = p.live_events
          ? `${p.live_events.home} × ${p.live_events.away}`
          : p.event_id;
        const line = p.line != null ? ` ${String(p.line).replace(".", ",")}` : "";
        const mkt =
          `${MKT_LABEL[p.market_key] || p.market_key} ${SEL_LABEL[p.selection_key] || p.selection_key}${line}`;
        const pnlClass = p.pnl_u == null ? "" : (Number(p.pnl_u) >= 0 ? "pnl-pos" : "pnl-neg");
        return `<tr>
          <td class="mono">${fmtWhen(p.placed_at)}</td>
          <td>${game}</td>
          <td>${mkt}</td>
          <td class="mono">${fmtOdd(p.odd_snapshot)}</td>
          <td class="status-${p.status}">${p.status}</td>
          <td class="mono ${pnlClass}">${fmtPnl(p.pnl_u)}</td>
        </tr>`;
      }).join("");
      refreshHeaderStats();
    }

    async function loadRanking() {
      const period = document.getElementById("rank-period").value;
      const body = document.getElementById("rank-body");

      if (period === "all") {
        const { data, error } = await sb
          .from("v_tipster_ranking")
          .select("*")
          .eq("contest_slug", "arena-open")
          .order("pnl_u", { ascending: false });
        if (error) {
          body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
          return;
        }
        renderRankRows(body, data || []);
        return;
      }

      const since = new Date();
      since.setDate(since.getDate() - Number(period));
      const { data: picks, error } = await sb
        .from("picks")
        .select("tipster_id,status,pnl_u,tipsters(display_name)")
        .gte("placed_at", since.toISOString());
      if (error) {
        body.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
        return;
      }
      const agg = new Map();
      for (const p of picks || []) {
        if (!agg.has(p.tipster_id)) {
          agg.set(p.tipster_id, {
            tipster_id: p.tipster_id,
            display_name: p.tipsters?.display_name || "—",
            pnl_u: 0,
            wins: 0,
            settled_n: 0,
            open_n: 0,
          });
        }
        const row = agg.get(p.tipster_id);
        if (p.status === "open") row.open_n += 1;
        if (p.status === "won" || p.status === "lost" || p.status === "void") {
          row.pnl_u += Number(p.pnl_u || 0);
        }
        if (p.status === "won" || p.status === "lost") {
          row.settled_n += 1;
          if (p.status === "won") row.wins += 1;
        }
      }
      const rows = [...agg.values()].map((r) => ({
        ...r,
        winrate: r.settled_n ? r.wins / r.settled_n : null,
      })).sort((a, b) => b.pnl_u - a.pnl_u);
      renderRankRows(body, rows);
    }

    function renderRankRows(body, rows) {
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="6" class="empty">Sem tipsters inscritos.</td></tr>`;
        return;
      }
      body.innerHTML = rows.map((r, i) => {
        const pnlClass = Number(r.pnl_u) >= 0 ? "pnl-pos" : "pnl-neg";
        const wr = r.winrate == null ? "—" : `${(Number(r.winrate) * 100).toFixed(0)}%`;
        const cls = [
          i < 3 ? "rank-top" : "",
          tipster && r.tipster_id === tipster.id ? "rank-me" : "",
        ].filter(Boolean).join(" ");
        return `<tr class="${cls}">
          <td class="mono">${i + 1}</td>
          <td>${r.display_name}${tipster && r.tipster_id === tipster.id ? " · você" : ""}</td>
          <td class="mono ${pnlClass}">${fmtPnl(r.pnl_u)}</td>
          <td class="mono">${wr}</td>
          <td class="mono">${r.settled_n ?? 0}</td>
          <td class="mono">${r.open_n ?? 0}</td>
        </tr>`;
      }).join("");
    }

    function startPoll() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => {
        const term = document.getElementById("panel-terminal");
        if (!term.hidden) {
          if (selectedSport === "tennis_sb") loadSuperbetTennis(true);
          else loadTerminal();
        } else refreshHeaderStats();
      }, 30000);
    }

    document.querySelectorAll(".tabs button").forEach((b) => {
      b.addEventListener("click", () => setTab(b.dataset.tab));
    });
    document.querySelectorAll(".catalog-nav-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        catalogMode = btn.dataset.catalog === "scheduled" ? "scheduled" : "live";
        selectedSport = null;
        document.querySelectorAll(".catalog-nav-btn").forEach((b) => {
          b.classList.toggle("active", b === btn);
        });
        loadTerminal();
      });
    });
    document.getElementById("rank-period").addEventListener("change", loadRanking);
    document.getElementById("toast-close").addEventListener("click", () => {
      document.getElementById("toast").classList.remove("show");
    });
    document.getElementById("btn-logout").addEventListener("click", async () => {
      await sb.auth.signOut();
      tipster = null;
      showApp(false);
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-err");
      errEl.hidden = true;
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const displayName = document.getElementById("display-name").value.trim();
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await ensureProfile(displayName || null);
        showApp(true);
        setTab("terminal");
        await loadTerminal();
        startPoll();
      } catch (err) {
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      }
    });

    (async () => {
      try {
        await loadClient();
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          await ensureProfile(null);
          showApp(true);
          setTab("terminal");
          await loadTerminal();
          startPoll();
        }
      } catch (err) {
        const errEl = document.getElementById("login-err");
        errEl.textContent = err.message || String(err);
        errEl.hidden = false;
      }
    })();
  </script>
</body>
